<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Flugtag - Epic Flying Machine</title>
<link href="https://fonts.googleapis.com/css2?family=Lilita+One&family=Baloo+2:wght@600;700;800&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  /* Lilita One: the chunky-but-legible display face used by big casual
     titles (Monopoly Go look). Baloo 2: rounded, readable body/UI. */
  --font-display: 'Lilita One', 'Arial Black', sans-serif;
  --font-flavor: 'Lilita One', 'Arial Black', sans-serif;
  --font-body: 'Baloo 2', 'Nunito', 'Arial', sans-serif;
  --font-num: 'Lilita One', 'Arial Black', sans-serif;
  --font-mono: 'Courier New', monospace;
  --sky-blue: #4A90D9;
  --ocean: #0088AA;
  --red: #FF3344;
  --yellow: #FFD700;
  --green: #44DD66;
  --white: #FFFFFF;
  --dark: #1A3A5C;
  --text-shadow: 3px 3px 0 rgba(0,0,0,0.5);
  --text-shadow-heavy: 4px 4px 0 rgba(0,0,0,0.7);
  --btn-radius: 16px;
  /* Sled Surfers tokens */
  --ss-navy:       #163A5F;
  --ss-ink-100:    #D8E2EC;
  --ss-sky-pale:   #E8F4FD;
  --ss-blue-100:   #BEE0F7;
  --ss-blue-300:   #6BC0EF;
  --ss-blue-500:   #3BA4E8;
  --ss-blue-700:   #1D7DB8;
  --ss-green-300:  #8EDC66;
  --ss-green-500:  #63C93B;
  --ss-green-700:  #3F9A20;
  --ss-red-500:    #EE3B3B;
  --ss-yellow-300: #FFE66B;
  --ss-yellow-500: #FFC41F;
  --ss-yellow-700: #C08A00;
  --ss-orange-500: #FF8A1F;
  --ss-orange-700: #B5510A;
  --r-lg: 20px;
  --r-xl: 28px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  position: fixed;
  touch-action: none;
  background: linear-gradient(to bottom, #5AABE0 0%, #87CEEB 40%, #B8D4E8 100%);
  font-family: var(--font-body);
}
canvas { display: block; width: 100%; height: 100%; }
.screen {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  opacity: 0; pointer-events: none;
  transition: opacity 0.4s ease;
  z-index: 10;
}
.screen.active { opacity: 1; pointer-events: auto; }
.screen.passthrough { pointer-events: none !important; }
.screen.passthrough .game-btn { pointer-events: auto; }
.game-btn {
  --btn-top: var(--ss-blue-300);
  --btn-mid: var(--ss-blue-500);
  --btn-deep: var(--ss-blue-700);
  font-family: var(--font-display);
  font-size: 22px; color: white;
  -webkit-text-stroke: 1px var(--ss-navy);
  text-shadow: 1px 2px 0 var(--ss-navy);
  background: linear-gradient(180deg, var(--btn-top), var(--btn-mid));
  border: 3px solid var(--ss-navy);
  border-radius: 999px;
  padding: 13px 38px; cursor: pointer;
  transition: transform 0.08s, box-shadow 0.08s, filter 0.08s;
  box-shadow: 0 6px 0 var(--btn-deep), 0 12px 22px rgba(12,40,70,0.30);
  text-transform: uppercase; letter-spacing: 1px;
  -webkit-tap-highlight-color: transparent;
  user-select: none; outline: none;
}
.game-btn:hover { filter: brightness(1.06); }
.game-btn:active { transform: translateY(4px) scale(0.98); box-shadow: 0 2px 0 var(--btn-deep), 0 6px 12px rgba(12,40,70,0.25); }
.game-btn.secondary { --btn-top: var(--ss-blue-300); --btn-mid: var(--ss-blue-500); --btn-deep: var(--ss-blue-700); }
.game-btn.green { --btn-top: var(--ss-green-300); --btn-mid: var(--ss-green-500); --btn-deep: var(--ss-green-700); }
/* Generic white info chip */
.ss-chip {
  display: flex; align-items: center; gap: 6px;
  background: #fff; border: 3px solid var(--ss-navy);
  border-radius: 999px; padding: 4px 12px;
  font-family: var(--font-display); font-size: 16px; color: var(--ss-navy);
  box-shadow: 0 3px 0 rgba(12,40,70,.18);
}
.ss-chip:empty { display: none; }
.game-btn.pulse { animation: btnPulse 1.5s ease-in-out infinite; }
@keyframes btnPulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.05)} }

/* Title Screen */
#screen-title { background: linear-gradient(to bottom, rgba(22,58,95,0) 35%, rgba(22,58,95,0.5) 100%); }
.title-text {
  font-family: var(--font-display); font-size: 86px;
  color: #fff;
  -webkit-text-stroke: 3px var(--ss-navy);
  text-shadow: 0 5px 0 var(--ss-navy), 0 11px 0 rgba(12,40,70,0.30), 0 18px 30px rgba(12,40,70,0.35);
  text-transform: uppercase; line-height: 1.05; text-align: center;
  letter-spacing: 0.02em;
}
.title-sub {
  font-family: var(--font-flavor); font-size: 21px;
  color: var(--ss-yellow-300);
  text-shadow: 1px 2px 0 var(--ss-navy), -1px -1px 0 rgba(22,58,95,0.6);
  text-transform: uppercase; letter-spacing: 0.12em;
  margin: 10px 0 32px; text-align: center;
}
.best-distance { margin-top: 18px; }

/* Aim HUD */
#screen-aim-hud { justify-content: flex-end; padding-bottom: 60px; }
@keyframes aimBounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
.power-display {
  font-family: var(--font-display); font-size: 17px;
  color: var(--ss-navy);
  background: rgba(255,255,255,0.94);
  border: 3px solid var(--ss-navy); border-radius: 999px;
  padding: 7px 20px; margin-bottom: 10px;
  box-shadow: 0 4px 0 rgba(12,40,70,0.20);
  letter-spacing: 0.04em;
}
.power-display:empty { display: none; }
/* First-flight drag hint: dot pulls down-left along a short path */
.drag-hint {
  position: absolute; top: 46%; left: 50%;
  width: 110px; height: 110px; margin-left: -28px;
  pointer-events: none;
}
.drag-hint-dot {
  position: absolute; top: 0; right: 0;
  width: 30px; height: 30px; border-radius: 50%;
  background: rgba(255,255,255,0.95);
  border: 3px solid var(--ss-navy);
  box-shadow: 0 3px 0 rgba(12,40,70,0.3);
  animation: dragPath 1.7s ease-in-out infinite;
}
.drag-hint-dot::after {
  content: ''; position: absolute; inset: 7px;
  border-radius: 50%; background: var(--ss-blue-300);
}
@keyframes dragPath {
  0%   { transform: translate(0, 0) scale(0.9); opacity: 0; }
  18%  { transform: translate(0, 0) scale(1.1); opacity: 1; }
  70%  { transform: translate(-58px, 62px) scale(1); opacity: 1; }
  100% { transform: translate(-58px, 62px) scale(0.9); opacity: 0; }
}

/* Flight HUD */
#screen-flight-hud { pointer-events: none; justify-content: flex-start; }
.hud-top {
  width: 100%; padding: 12px 14px;
  display: flex; justify-content: space-between; align-items: flex-start;
}
.hud-left { display: flex; flex-direction: column; align-items: flex-start; gap: 6px; }
.hud-stat { font-size: 14px; padding: 3px 12px; }
.hud-distance {
  position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
  font-family: var(--font-num); font-size: 46px;
  color: #fff;
  -webkit-text-stroke: 2px var(--ss-navy);
  text-shadow: 0 4px 0 var(--ss-navy), 0 9px 18px rgba(12,40,70,0.35);
}
.hud-boost-bar {
  width: 130px; height: 15px;
  background: var(--ss-ink-100);
  border: 2.5px solid var(--ss-navy);
  border-radius: 999px; overflow: hidden;
  box-shadow: inset 0 2px 0 rgba(12,40,70,0.18), 0 3px 0 rgba(12,40,70,0.18);
}
.hud-boost-fill {
  height: 100%; background: linear-gradient(180deg, var(--ss-yellow-300), var(--ss-yellow-500));
  border-radius: 999px; transition: width 0.1s;
}
.hud-boost-btn {
  position: absolute; right: 18px; bottom: 26px;
  width: 78px; height: 78px; border-radius: 50%;
  background: radial-gradient(circle at 35% 30%, #FFB066, var(--ss-orange-500) 70%);
  border: 4px solid var(--ss-navy);
  box-shadow: 0 6px 0 var(--ss-orange-700), 0 12px 22px rgba(12,40,70,0.35);
  color: #fff; font-family: var(--font-display); font-size: 16px;
  letter-spacing: 0.04em;
  text-shadow: 1px 2px 0 var(--ss-navy);
  pointer-events: auto; cursor: pointer; user-select: none;
  -webkit-tap-highlight-color: transparent; outline: none;
  display: grid; place-items: center;
  transition: transform 0.08s, box-shadow 0.08s, filter 0.2s;
}
.hud-boost-btn.held { transform: translateY(4px) scale(0.97); box-shadow: 0 2px 0 var(--ss-orange-700), 0 6px 12px rgba(12,40,70,0.3); }
.hud-boost-btn.empty { filter: saturate(0.25) brightness(0.85); opacity: 0.65; }
.screen.passthrough .hud-boost-btn { pointer-events: auto; }

/* Splash Screen */
#screen-splash { background: rgba(22,58,95,0.25); }
.splash-text {
  font-family: var(--font-display); font-size: 84px;
  color: var(--white);
  -webkit-text-stroke: 3px var(--ss-navy);
  text-shadow: 0 5px 0 var(--ss-navy), 0 14px 28px rgba(12,40,70,0.45);
  animation: splashPop 0.5s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes splashPop { 0%{transform:scale(0);opacity:0} 100%{transform:scale(1);opacity:1} }

/* Results Screen */
#screen-results { background: rgba(22,58,95,0.45); }
.results-card {
  position: relative;
  background: linear-gradient(180deg, #F4FAFF 0%, #CDE6F8 100%);
  border: 3px solid var(--ss-navy);
  border-radius: var(--r-xl); padding: 36px 24px 22px;
  text-align: center; max-width: 360px; width: 90%;
  box-shadow: 0 10px 0 rgba(12,40,70,0.25), 0 22px 44px rgba(12,40,70,0.40);
}
.results-card.pop { animation: cardPop 0.34s cubic-bezier(0.34,1.56,0.64,1); }
@keyframes cardPop { 0%{transform:scale(0.78);opacity:0} 100%{transform:scale(1);opacity:1} }
.results-ribbon {
  position: absolute; top: 0; left: 50%;
  transform: translate(-50%, -55%);
  background: linear-gradient(180deg, var(--ss-blue-300), var(--ss-blue-500));
  border: 3px solid var(--ss-navy); border-radius: 14px;
  padding: 9px 28px; white-space: nowrap;
  font-family: var(--font-flavor); font-size: 22px;
  color: #fff; letter-spacing: 0.06em;
  -webkit-text-stroke: 1px var(--ss-navy);
  text-shadow: 1px 2px 0 var(--ss-navy);
  box-shadow: 0 5px 0 rgba(12,40,70,0.25);
}
.results-row {
  display: flex; justify-content: space-between; align-items: center;
  background: #fff; border: 2.5px solid var(--ss-navy);
  border-radius: 14px; padding: 7px 14px; margin-bottom: 8px;
  box-shadow: 0 3px 0 rgba(12,40,70,0.15);
}
.results-label {
  font-family: var(--font-body); font-size: 13px; font-weight: 800;
  color: rgba(22,58,95,0.62);
  text-transform: uppercase; letter-spacing: 0.06em;
}
.results-value {
  font-family: var(--font-num); font-size: 21px;
  color: var(--ss-navy);
}
.results-coins {
  display: flex; align-items: center; justify-content: center; gap: 9px;
  font-family: var(--font-display); font-size: 31px;
  color: var(--ss-navy);
  margin: 14px 0 4px;
}
.results-coins .ss-coin-dot { width: 23px; height: 23px; }
.results-buttons { display: flex; gap: 12px; margin-top: 16px; justify-content: center; }
.results-buttons .game-btn { font-size: 19px; padding: 12px 26px; }
.results-best {
  font-family: var(--font-body); font-size: 13px; font-weight: 800;
  color: rgba(22,58,95,0.5); margin-top: 10px; min-height: 18px;
}
.new-record {
  display: inline-block;
  background: linear-gradient(180deg, #FFB066, var(--ss-orange-500));
  border: 2.5px solid var(--ss-navy); border-radius: 999px;
  padding: 5px 18px;
  font-family: var(--font-display); font-size: 16px;
  color: #fff;
  text-shadow: 1px 1px 0 var(--ss-navy);
  box-shadow: 0 3px 0 rgba(12,40,70,0.25);
  animation: recordPulse 0.8s ease-in-out infinite;
}
@keyframes recordPulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.08)} }

/* Upgrade Cards (bottom of aim screen) */
.aim-coins-chip { position: absolute; top: 14px; left: 14px; font-size: 18px; }
.aim-best { position: absolute; top: 14px; right: 14px; }
.aim-tap-text {
  font-family: var(--font-display); font-size: 36px;
  color: white;
  -webkit-text-stroke: 2px var(--ss-navy);
  text-shadow: 3px 4px 0 var(--ss-navy), 0 10px 20px rgba(12,40,70,0.35);
  position: absolute; top: 36%; left: 50%; transform: translateX(-50%);
  animation: aimBounce 1s ease-in-out infinite;
  white-space: nowrap;
}
.upgrade-cards {
  position: absolute; bottom: 14px; left: 50%; transform: translateX(-50%);
  display: flex; gap: 10px;
  pointer-events: auto;
}
.upg-card {
  width: 124px;
  background: linear-gradient(180deg, #FFFFFF 0%, #DCEEFB 100%);
  border: 3px solid var(--ss-navy);
  border-radius: var(--r-lg); padding: 9px 8px 8px; text-align: center;
  cursor: pointer; user-select: none;
  box-shadow: 0 6px 0 rgba(12,40,70,0.22);
  transition: transform 0.08s, box-shadow 0.08s;
}
.upg-card:active { transform: translateY(3px); box-shadow: 0 3px 0 rgba(12,40,70,0.22); }
.upg-card-title {
  font-family: var(--font-display); font-size: 13px;
  color: var(--ss-navy); text-transform: uppercase;
  letter-spacing: 0.05em; margin-bottom: 6px;
}
.upg-card-icon {
  width: 44px; height: 44px; margin: 0 auto 6px;
  border-radius: 50%;
  display: grid; place-items: center;
  font-size: 23px; line-height: 1;
  border: 3px solid var(--ss-navy);
  background: linear-gradient(180deg, var(--upg-accent-top, var(--ss-blue-100)), var(--upg-accent, var(--ss-blue-300)));
  box-shadow: inset 0 -4px 0 rgba(12,40,70,0.18);
}
.upg-card[data-track="slingshot"] { --upg-accent-top: #FFB3A8; --upg-accent: #FF7B6B; }
.upg-card[data-track="plane"]     { --upg-accent-top: var(--ss-blue-100); --upg-accent: var(--ss-blue-300); }
.upg-card[data-track="income"]    { --upg-accent-top: var(--ss-yellow-300); --upg-accent: var(--ss-yellow-500); }
.upg-card-dots {
  display: flex; gap: 3px; justify-content: center; margin-bottom: 8px;
}
.upg-card-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: #fff; border: 2px solid var(--ss-navy); opacity: 0.4;
}
.upg-card-dot.filled { background: var(--ss-yellow-500); opacity: 1; }
.upg-card-btn {
  font-family: var(--font-display); font-size: 13px;
  color: white;
  text-shadow: 1px 1px 0 rgba(12,40,70,0.4);
  background: linear-gradient(180deg, var(--ss-green-300), var(--ss-green-500));
  border: 2.5px solid var(--ss-navy); border-radius: 999px;
  padding: 6px 0; width: 100%; cursor: pointer;
  box-shadow: 0 4px 0 var(--ss-green-700);
  transition: transform 0.08s, box-shadow 0.08s;
  display: flex; align-items: center; justify-content: center; gap: 5px;
}
.upg-card-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 var(--ss-green-700); }
.upg-card-btn.disabled {
  background: linear-gradient(180deg, #C9D4DE, #9FB0BE);
  box-shadow: 0 4px 0 #6E8090;
  filter: saturate(0.4); opacity: 0.85; cursor: default;
}
.upg-card-btn.maxed {
  background: linear-gradient(180deg, var(--ss-yellow-300), var(--ss-yellow-500));
  color: var(--ss-navy); text-shadow: none;
  box-shadow: 0 4px 0 var(--ss-yellow-700);
}
.upg-coin {
  width: 13px; height: 13px; border-radius: 50%; flex-shrink: 0;
  background: radial-gradient(circle at 35% 35%, #FFE89A, var(--ss-yellow-500));
  border: 2px solid var(--ss-navy);
}

/* ===== Sled Surfers garage ===== */
.ss-garage {
  position: absolute;
  top: 0; bottom: 0;
  left: 50%; transform: translateX(-50%);
  width: 100%; max-width: 500px;
  display: flex; flex-direction: column;
  padding: 14px 14px 0;
  background: transparent;
}
.ss-garage-top {
  display: flex; align-items: flex-start; justify-content: space-between;
  gap: 10px;
  margin-bottom: 8px;
}
.ss-garage-titles {
  flex: 1; display: flex; flex-direction: column; align-items: center; gap: 2px;
  pointer-events: none;
}
.ss-garage-subtitle {
  font-family: var(--font-display); font-size: 13px;
  color: #fff; letter-spacing: .06em;
  text-shadow: 2px 2px 0 var(--ss-navy);
  text-transform: uppercase;
}
.ss-coin-chip {
  display: flex; align-items: center; gap: 6px;
  background: #fff; border: 3px solid var(--ss-navy);
  border-radius: 999px; padding: 4px 12px;
  font-family: var(--font-display); font-size: 18px; color: var(--ss-navy);
  box-shadow: 0 3px 0 rgba(12,40,70,.18);
}
.ss-coin-dot {
  width: 14px; height: 14px; border-radius: 50%;
  background: radial-gradient(circle at 35% 35%, #FFE89A, var(--ss-yellow-500));
  border: 2px solid var(--ss-navy);
}
.ss-ribbon {
  background: var(--ss-blue-500);
  border: 3px solid var(--ss-navy);
  border-radius: 12px;
  padding: 8px 22px;
  color: #fff;
  font-family: var(--font-display);
  font-size: 22px;
  letter-spacing: .04em;
  -webkit-text-stroke: 1px var(--ss-navy);
  text-shadow: 1px 1px 0 var(--ss-navy);
  box-shadow: 0 4px 0 rgba(12,40,70,.2);
}
.ss-close {
  width: 38px; height: 38px; border-radius: 50%;
  background: var(--ss-red-500); border: 3px solid var(--ss-navy);
  color: #fff; font-size: 22px; font-weight: 800; cursor: pointer;
  box-shadow: 0 4px 0 rgba(12,40,70,.25);
  display: grid; place-items: center; line-height: 1;
}
.ss-close:active { transform: translateY(2px); box-shadow: 0 2px 0 rgba(12,40,70,.25); }
.ss-garage-hero {
  flex: 1; display: flex; flex-direction: column;
  justify-content: flex-end; align-items: center; gap: 12px;
  padding-bottom: 14px; pointer-events: none;
}
.ss-garage-panel {
  background: linear-gradient(180deg, #E8F4FD 0%, #C8E1F5 100%);
  border-top: 3px solid var(--ss-navy);
  border-left: 3px solid var(--ss-navy);
  border-right: 3px solid var(--ss-navy);
  border-radius: var(--r-xl) var(--r-xl) 0 0;
  padding: 14px 14px 18px;
  margin: 0 -14px;
  box-shadow: 0 -6px 0 rgba(12,40,70,.08);
  pointer-events: auto;
}
.ss-garage-title {
  font-family: var(--font-display); font-size: 42px;
  color: #fff;
  -webkit-text-stroke: 2px var(--ss-navy);
  text-shadow: 3px 3px 0 var(--ss-navy);
  letter-spacing: .04em;
}
.ss-skin-tabs { display: flex; gap: 8px; pointer-events: auto; flex-wrap: wrap; justify-content: center; }
.ss-skin-tab {
  background: #fff; border: 2.5px solid var(--ss-navy);
  border-radius: 999px; padding: 4px 14px;
  font-family: var(--font-display); font-size: 13px;
  color: var(--ss-navy); cursor: pointer;
  box-shadow: 0 3px 0 rgba(12,40,70,.18);
  user-select: none;
}
.ss-skin-tab.active {
  background: var(--ss-blue-500); color: #fff;
  text-shadow: 1px 1px 0 var(--ss-navy);
}
.ss-select-pill {
  pointer-events: auto;
  background: linear-gradient(180deg, var(--ss-green-300), var(--ss-green-500));
  border: 3px solid var(--ss-navy); border-radius: 999px;
  padding: 12px 52px;
  font-family: var(--font-display); font-size: 22px;
  text-transform: uppercase; letter-spacing: 0.04em;
  color: #fff; cursor: pointer;
  -webkit-text-stroke: 1px var(--ss-navy);
  text-shadow: 1px 2px 0 var(--ss-navy);
  box-shadow: 0 6px 0 var(--ss-green-700), 0 12px 22px rgba(12,40,70,.25);
  transition: transform 0.08s, box-shadow 0.08s;
}
.ss-select-pill:active {
  transform: translateY(3px); box-shadow: 0 3px 0 var(--ss-green-700);
}
.ss-garage-panel.pop { animation: panelUp 0.35s cubic-bezier(0.34,1.56,0.64,1); }
@keyframes panelUp { 0%{transform:translateY(46px);opacity:0} 100%{transform:translateY(0);opacity:1} }
.ss-craft-grid {
  display: grid; grid-template-columns: repeat(4, 1fr);
  gap: 10px; pointer-events: auto;
}
.ss-craft-card {
  aspect-ratio: 1/1.1;
  background: linear-gradient(180deg, #F0F7FC 0%, #C8E1F5 100%);
  border: 3px solid var(--ss-navy); border-radius: var(--r-xl);
  box-shadow: 0 6px 0 rgba(12,40,70,.18);
  display: grid; place-items: center;
  font-size: 40px; cursor: pointer; position: relative;
  user-select: none;
  transition: transform .1s;
}
.ss-craft-card:active { transform: translateY(3px); box-shadow: 0 3px 0 rgba(12,40,70,.18); }
.ss-craft-card.active {
  background: linear-gradient(180deg, #FFE89A 0%, var(--ss-yellow-500) 100%);
  border-color: var(--ss-navy);
}
.ss-craft-card .ss-craft-label {
  position: absolute; bottom: 4px;
  font-family: var(--font-display); font-size: 10px;

  text-transform: uppercase;
}

/* ===== Level progression (Sled Surfers) ===== */
.ss-level-row {
  position: absolute; top: 18px; left: 50%; transform: translateX(-50%);
  width: min(340px, 80vw);
  display: flex; flex-direction: column; gap: 4px;
  padding: 10px 14px;
  background: rgba(255,255,255,.78);

}
@keyframes floatUp {

<!-- Floating text layer -->
<div id="float-layer" style="position:absolute;inset:0;pointer-events:none;z-index:20;overflow:hidden;"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/meshoptimizer@0.20.0/meshopt_decoder.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/GammaCorrectionShader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/VignetteShader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/objects/Reflector.js"></script>
<script>
// ===== CONSTANTS & CONFIG =====
const DEG2RAD = Math.PI / 180;
const RAMP_HEIGHT = 12;
const RAMP_LENGTH = 8;
const RAMP_ANGLE = 15 * DEG2RAD;
const GRAVITY = 9.8;
const AIR_DENSITY = 1.2;
const MAX_PULL_PX = 180;
const MAX_PITCH = 40 * DEG2RAD;
const PITCH_SPEED = 1.8;
const AUTO_STABILIZE = 0.4;
const MAX_UPGRADE_LEVEL = 10;
const BUOY_COUNT = 30;
const BUOY_SPACING = 50;

const UPGRADES = {
  slingshot: { name: 'Slingshot', baseCost: 50,  perLevel: 55,  icon: '\u{1F3F9}' },
  plane:     { name: 'Plane',     baseCost: 75,  perLevel: 80,  icon: '\u{2708}\u{FE0F}' },
  income:    { name: 'Income',    baseCost: 120, perLevel: 130, icon: '\u{1F4B0}' },
};

// ===== CRAFT CATALOG =====
// Each craft has skins — each skin is a complete GLB
const CRAFTS = [
  { id: 'bathtub', name: 'Bathtub', icon: '\u{1F6C1}', subtitle: 'Soak. Launch. Splash.', skins: [
    { name: 'Classic',   file: 'Meshy_AI_Gilded_Bath_0330161619_texture.glb',       rotY: Math.PI * 1.5 },
    { name: 'Cardboard', file: 'Meshy_AI_Bathtub_Cardboard_0402170410_texture.glb', rotY: Math.PI * 0.5 },
  ]},
  { id: 'rocket', name: 'Rocket', icon: '\u{1F680}', subtitle: 'Ignite. Rise. Glory.', skins: [
    { name: 'Classic', file: 'Meshy_AI_Red_Stripe_Rocket_0330160432_texture.glb', rotY: Math.PI * 0.5 },
    { name: 'Delta',   file: 'Meshy_AI_Rocket_delta_0402170813_texture.glb',      rotY: Math.PI * 0.5 },
  ]},
  { id: 'banana', name: 'Banana', icon: '\u{1F34C}', subtitle: 'Slippery when airborne.', skins: [
    { name: 'Classic', file: 'Meshy_AI_banana_3d_0329211148_texture.glb',       rotY: Math.PI * 0.5 },
    { name: 'Biplane', file: 'Meshy_AI_Banana_Bip_0402164037_texture.glb',      rotY: Math.PI * 0.5 },
  ]},
  { id: 'couch', name: 'Couch', icon: '\u{1F6CB}\uFE0F', subtitle: 'Comfort meets gravity.', skins: [
    { name: 'Classic', file: 'Meshy_AI_couch_car_0330162428_texture.glb',       rotY: 0 },
    { name: 'Winged',  file: 'Meshy_AI_Couch_Standard_0402165535_texture.glb',  rotY: 0 },
  ]},
  { id: 'shoe', name: 'Shoe', icon: '\u{1F45F}', subtitle: 'Just do it. Off the ramp.', skins: [
    { name: 'Classic', file: 'Meshy_AI_shoe_car_0330163356_texture.glb',       rotY: Math.PI * 0.5 },
    { name: 'Biplane', file: 'Meshy_AI_Shoe_Bip_0402164732_texture.glb',      rotY: Math.PI * 0.5 },
  ]},
];
let currentCraftIdx = 0;
let currentSkinIdx = 0;
const glbCache = {};

function loadGLB(url) {
  if (glbCache[url]) return Promise.resolve(glbCache[url].clone());
  return new Promise((resolve, reject) => {
    const loader = new THREE.GLTFLoader();
    loader.setMeshoptDecoder(MeshoptDecoder);
    loader.load(url, (gltf) => {
      glbCache[url] = gltf.scene;
      resolve(gltf.scene.clone());
    }, undefined, (err) => {
      console.warn('GLB load failed:', url, err);
      reject(err);
    });
  });
}

function toonifyModel(model) {
  model.traverse((child) => {
    if (child.isMesh && child.material) {
      // Unlit/meshopt GLBs (village houses, chapel) ship without normals;
      // toon lighting needs them or the mesh renders black (NaN normalize).
      if (!child.geometry.attributes.normal) child.geometry.computeVertexNormals();
      const origColor = child.material.color ? child.material.color.clone() : new THREE.Color(0xcccccc);
      const origMap = child.material.map || null;
      const mat = new THREE.MeshToonMaterial({ color: origColor, gradientMap: gradientMap5 });
      if (origMap) mat.map = origMap;
      child.material = mat;
      child.castShadow = true;
      child.receiveShadow = true;
    }
  });
}

// ===== SAVE / LOAD =====
const SAVE_KEY = 'flugtag:save';
const LEVEL_TARGET_M = 800;  // distance required in a single flight to clear the level
const defaultSave = {
  coins: 0, totalDistance: 0, bestDistance: 0, totalFlights: 0,
  upgrades: { slingshot: 0, plane: 0, income: 0 },
  craftIdx: 0, skinIdx: 0,
  levelTarget: LEVEL_TARGET_M,
  levelComplete: false,
};
let save;
function loadSave() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    save = raw ? { ...defaultSave, ...JSON.parse(raw), upgrades: { ...defaultSave.upgrades, ...(JSON.parse(raw).upgrades || {}) } } : { ...defaultSave };
  } catch { save = { ...defaultSave }; }
}
function writeSave() {
  try { localStorage.setItem(SAVE_KEY, JSON.stringify(save)); } catch {}
}
function getUpgradeCost(key) {
  const u = UPGRADES[key];
  return u.baseCost + save.upgrades[key] * u.perLevel;
}

// Derived stats from upgrades
// Slingshot upgrade: launch speed
function getMaxLaunchSpeed() { return 28 + save.upgrades.slingshot * 3.5; }
// Plane upgrade: lift, wing area, engine thrust, fuel (all bundled)
function getLiftCoeff()      { return 0.45 + save.upgrades.plane * 0.07; }
function getWingArea()       { return 3.0 + save.upgrades.plane * 0.4; }
function getEngineThrust()   { return 0.3 + save.upgrades.plane * 0.6; }
function getMaxFuel()        { return 1.0 + save.upgrades.plane * 2.0; }
function getDragCoeff()      { return Math.max(0.03, 0.06 - save.upgrades.plane * 0.003); }
// Income upgrade: coin multiplier
function getIncomeMulti()    { return 1.0 + save.upgrades.income * 0.3; }

// ===== THREE.JS SCENE SETUP =====
const canvas = document.getElementById('game-canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
renderer.setClearColor(0x87CEEB, 1); // opaque — the sky lives in-scene now
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.outputEncoding = THREE.sRGBEncoding;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 4000);

// Post-processing: render -> bloom -> vignette -> gamma
// (RT stays linear in r128, so the gamma pass does the final sRGB conversion.)
const composer = new THREE.EffectComposer(renderer);
composer.addPass(new THREE.RenderPass(scene, camera));
const bloomPass = new THREE.UnrealBloomPass(
  new THREE.Vector2(window.innerWidth / 2, window.innerHeight / 2), 0.22, 0.4, 0.92
);
composer.addPass(bloomPass);
const vignettePass = new THREE.ShaderPass(THREE.VignetteShader);
vignettePass.uniforms.offset.value = 1.05;
vignettePass.uniforms.darkness.value = 1.08;
composer.addPass(vignettePass);
composer.addPass(new THREE.ShaderPass(THREE.GammaCorrectionShader));

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  composer.setSize(window.innerWidth, window.innerHeight);
});

// ===== TOON MATERIAL HELPERS =====
const gradientMap3 = createGradientMap(3);
const gradientMap5 = createGradientMap(5);

function createGradientMap(steps) {
  let colors;
  if (steps === 3) colors = new Uint8Array([102, 178, 255]);
  else if (steps === 5) colors = new Uint8Array([77, 128, 178, 217, 255]);
  else {
    colors = new Uint8Array(steps);
    for (let i = 0; i < steps; i++) colors[i] = Math.round(((i + 1) / steps) * 255);
  }
  const t = new THREE.DataTexture(colors, colors.length, 1, THREE.LuminanceFormat);
  t.minFilter = THREE.NearestFilter;
  t.magFilter = THREE.NearestFilter;
  t.needsUpdate = true;
  return t;
}

function toonMat(color, hero = false) {
  return new THREE.MeshToonMaterial({ color, gradientMap: hero ? gradientMap5 : gradientMap3 });
}

function addOutline(mesh, thickness = 0.03) {
  const geo = mesh.geometry.clone();
  const mat = new THREE.MeshBasicMaterial({ color: 0x222222, side: THREE.BackSide });
  const outline = new THREE.Mesh(geo, mat);
  outline.scale.multiplyScalar(1 + thickness);
  mesh.add(outline);
  return outline;
}

// ===== LIGHTING =====
const ambientLight = new THREE.AmbientLight(0xffffff, 0.35);
scene.add(ambientLight);

const sunLight = new THREE.DirectionalLight(0xfff4e0, 1.0);
sunLight.position.set(40, 80, 30);
sunLight.castShadow = true;
sunLight.shadow.mapSize.set(2048, 2048);
sunLight.shadow.camera.near = 1;
sunLight.shadow.camera.far = 200;
sunLight.shadow.camera.left = -60;
sunLight.shadow.camera.right = 60;
sunLight.shadow.camera.top = 60;
sunLight.shadow.camera.bottom = -20;
scene.add(sunLight);

const hemiLight = new THREE.HemisphereLight(0x87CEEB, 0x3D7A2D, 0.5);
scene.add(hemiLight);

// ===== SKY SYSTEM (in-scene: dome, sun, clouds, birds, haze, panorama) =====
// Distance fog gives the toon world atmospheric depth; sky elements opt out.
scene.fog = new THREE.Fog(0xC8E2F0, 320, 1900);

const skyGroup = new THREE.Group();
scene.add(skyGroup);

// Gradient sky dome
(function createSkyDome() {
  const c = document.createElement('canvas'); c.width = 4; c.height = 256;
  const g = c.getContext('2d');
  const grad = g.createLinearGradient(0, 0, 0, 256);
  grad.addColorStop(0.0,  '#3E8FD8');  // zenith
  grad.addColorStop(0.45, '#7FC4EE');
  grad.addColorStop(0.72, '#C9E9F8');  // horizon glow
  grad.addColorStop(1.0,  '#E8F4E0');  // below horizon (hidden by ground)
  g.fillStyle = grad; g.fillRect(0, 0, 4, 256);
  const tex = new THREE.CanvasTexture(c);
  tex.encoding = THREE.sRGBEncoding;
  const dome = new THREE.Mesh(
    new THREE.SphereGeometry(2800, 24, 18),
    new THREE.MeshBasicMaterial({ map: tex, side: THREE.BackSide, fog: false, depthWrite: false })
  );
  dome.renderOrder = -10;
  skyGroup.add(dome);
})();

// Sun disc + halo (bloom picks these up)
const sunDir = new THREE.Vector3(0.45, 0.62, 0.64).normalize();
(function createSun() {
  const sun = new THREE.Mesh(
    new THREE.CircleGeometry(60, 24),
    new THREE.MeshBasicMaterial({ color: 0xFFFBE8, fog: false, depthWrite: false })
  );
  const halo = new THREE.Mesh(
    new THREE.CircleGeometry(150, 24),
    new THREE.MeshBasicMaterial({ color: 0xFFF2C4, fog: false, depthWrite: false, transparent: true, opacity: 0.32 })
  );
  sun.position.copy(sunDir).multiplyScalar(2400);
  halo.position.copy(sunDir).multiplyScalar(2420);
  sun.renderOrder = -9; halo.renderOrder = -9;
  sun.onBeforeRender = function () { this.lookAt(camera.position); };
  halo.onBeforeRender = function () { this.lookAt(camera.position); };
  skyGroup.add(sun); skyGroup.add(halo);
})();

// Salzburg panorama: screen-locked like the original CSS background —
// always spans the full viewport width at its distance, height follows the
// image's own aspect ratio (never stretched), bottom pinned to the horizon.
let panoPlane = null;
let panoAspect = 4.4; // corrected from the real image once loaded
const PANO_DIST = 2350;
const PANO_CROP = 0.78; // drop the PNG's baked water band
(function createPanoramaBackdrop() {
  const tex = new THREE.TextureLoader().load('Cartoon_panoramic_skyline_202604022029.png', (t) => {
    panoAspect = (t.image.width / (t.image.height * PANO_CROP));
  });
  tex.encoding = THREE.sRGBEncoding;
  tex.anisotropy = 4;
  tex.repeat.set(1, PANO_CROP);
  tex.offset.set(0, 0.22);
  panoPlane = new THREE.Mesh(
    new THREE.PlaneGeometry(1, 1),
    new THREE.MeshBasicMaterial({ map: tex, fog: false, depthWrite: false })
  );
  panoPlane.position.set(0, 0, PANO_DIST);
  panoPlane.rotation.y = Math.PI; // face the player
  panoPlane.renderOrder = -8;
  skyGroup.add(panoPlane);
})();

// (Haze ridges removed — at flight altitude the transparent cylinder walls read
// as sky artifacts; distance fog + the panorama carry the depth instead.)

// Puffy toon clouds drifting (instanced ellipsoid blobs, 3 per cloud)
const CLOUD_N = 11;
let cloudMesh = null;
const cloudData = [];
(function createClouds() {
  cloudMesh = new THREE.InstancedMesh(
    new THREE.SphereGeometry(1, 10, 8),
    new THREE.MeshBasicMaterial({ color: 0xFFFFFF, fog: false }),
    CLOUD_N * 3
  );
  for (let i = 0; i < CLOUD_N; i++) {
    cloudData.push({
      x: (Math.random() - 0.5) * 900,
      y: 70 + Math.random() * 90,
      z: -100 + Math.random() * 1700,
      s: 14 + Math.random() * 16,
      drift: 1.2 + Math.random() * 1.6,
    });
  }
  cloudMesh.frustumCulled = false;
  scene.add(cloudMesh);
})();
const cloudDummy = new THREE.Object3D();
function updateClouds(time) {
  for (let i = 0; i < CLOUD_N; i++) {
    const cd = cloudData[i];
    let x = cd.x + time * cd.drift;
    x = ((x + 1100) % 2200) - 1100; // wrap across the sky
    const lobes = [[0, 0, 1.0], [-0.85, -0.12, 0.62], [0.8, -0.1, 0.7]];
    for (let l = 0; l < 3; l++) {
      cloudDummy.position.set(x + lobes[l][0] * cd.s, cd.y + lobes[l][1] * cd.s, cd.z);
      cloudDummy.scale.set(cd.s * lobes[l][2], cd.s * lobes[l][2] * 0.55, cd.s * lobes[l][2] * 0.8);
      cloudDummy.rotation.set(0, 0, 0);
      cloudDummy.updateMatrix();
      cloudMesh.setMatrixAt(i * 3 + l, cloudDummy.matrix);
    }
  }
  cloudMesh.instanceMatrix.needsUpdate = true;
}

// Birds circling over the river (two instanced wing meshes, flapping)
const BIRD_N = 8;
let birdL = null, birdR = null;
const birdData = [];
(function createBirds() {
  const wingL = new THREE.PlaneGeometry(1.0, 0.34); wingL.translate(-0.5, 0, 0);
  const wingR = new THREE.PlaneGeometry(1.0, 0.34); wingR.translate(0.5, 0, 0);
  const mat = () => new THREE.MeshBasicMaterial({ color: 0x2E4A66, side: THREE.DoubleSide });
  birdL = new THREE.InstancedMesh(wingL, mat(), BIRD_N);
  birdR = new THREE.InstancedMesh(wingR, mat(), BIRD_N);
  for (let i = 0; i < BIRD_N; i++) {
    birdData.push({
      cx: (Math.random() - 0.5) * 120,
      cy: 26 + Math.random() * 22,
      cz: 60 + Math.random() * 700,
      r: 18 + Math.random() * 26,

// Normal map: blobby noise heightfield -> Sobel
function makeWaterNormalTexture() {
  const S = 128;
  const hc = document.createElement('canvas'); hc.width = S; hc.height = S;
  const hg = hc.getContext('2d');
  hg.fillStyle = '#808080'; hg.fillRect(0, 0, S, S);
  for (let i = 0; i < 170; i++) {
    const x = Math.random() * S, y = Math.random() * S, r = 4 + Math.random() * 13;
    const v = Math.random() > 0.5 ? 255 : 0;
    const rg = hg.createRadialGradient(x, y, 0, x, y, r);
    rg.addColorStop(0, 'rgba(' + v + ',' + v + ',' + v + ',0.16)');
    rg.addColorStop(1, 'rgba(' + v + ',' + v + ',' + v + ',0)');
    hg.fillStyle = rg;
    hg.beginPath(); hg.arc(x, y, r, 0, Math.PI * 2); hg.fill();
  }
  const src = hg.getImageData(0, 0, S, S).data;
  const h = (x, y) => src[(((y + S) % S) * S + ((x + S) % S)) * 4];
  const nc = document.createElement('canvas'); nc.width = S; nc.height = S;
  const ng = nc.getContext('2d');
  const out = ng.createImageData(S, S);
  const K = 2.4; // bump strength
  for (let y = 0; y < S; y++) {
    for (let x = 0; x < S; x++) {
      const dx = (h(x + 1, y) - h(x - 1, y)) / 255;
      const dy = (h(x, y + 1) - h(x, y - 1)) / 255;
      let nx = -dx * K, ny = -dy * K, nz = 1;
      const inv = 1 / Math.sqrt(nx * nx + ny * ny + nz * nz);
      const i = (y * S + x) * 4;
      out.data[i]     = Math.round((nx * inv * 0.5 + 0.5) * 255);
      out.data[i + 1] = Math.round((ny * inv * 0.5 + 0.5) * 255);
      out.data[i + 2] = Math.round((nz * inv * 0.5 + 0.5) * 255);
      out.data[i + 3] = 255;
    }
  }
  ng.putImageData(out, 0, 0);
  const t = new THREE.CanvasTexture(nc);
  t.wrapS = t.wrapT = THREE.RepeatWrapping;
  t.repeat.set(4, 300); // ~12.5m x 13.3m detail tiles
  return t;
}

const WAVE_GLSL = `
uniform float uTime;
float waveH(float x, float z, float t) {
  return sin(x * 0.10 + t * 0.9) * 0.11
       + sin(z * 0.055 + t * 0.7) * 0.10
       + sin((x + z) * 0.042 - t * 0.5) * 0.06
       + sin(z * 0.13 - t * 1.3) * 0.045;
}
vec3 waveN(float x, float z, float t) {
  float dx = 0.011 * cos(x * 0.10 + t * 0.9) + 0.00252 * cos((x + z) * 0.042 - t * 0.5);
  float dz = 0.0055 * cos(z * 0.055 + t * 0.7) + 0.00252 * cos((x + z) * 0.042 - t * 0.5)

}

const reflectExclude = []; // objects hidden during the mirror pass
const reflector = (function createReflector() {
  const shader = {
    uniforms: {
      color: { value: null },
      tDiffuse: { value: null },
      textureMatrix: { value: null },
      tNormal: { value: null },
      uTime: { value: 0 },
    },
    vertexShader: `
      uniform mat4 textureMatrix;
      varying vec4 vUvP;
      varying vec3 vWorld;
      void main() {
        vUvP = textureMatrix * vec4(position, 1.0);
        vWorld = (modelMatrix * vec4(position, 1.0)).xyz;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }`,
    fragmentShader: `
      uniform vec3 color;
      uniform sampler2D tDiffuse;
      uniform sampler2D tNormal;
      uniform float uTime;
      varying vec4 vUvP;
      varying vec3 vWorld;
      void main() {
        vec2 nUv = vWorld.xz * 0.075 + vec2(0.0, -uTime * 0.045);
        vec3 n = texture2D(tNormal, nUv).rgb * 2.0 - 1.0;
        vec4 uv4 = vUvP;

        vec3 refl = texture2DProj(tDiffuse, uv4).rgb;

  };

    clipBias: 0.05,
    textureWidth: 512,
    textureHeight: 512,
    color: 0xEAF7FB,
    shader,
  });
  r.rotation.x = -Math.PI / 2;
  r.position.y = 0.34; // just above the wave crests
  r.material.transparent = true;
  r.material.depthWrite = false;
  r.material.uniforms.uTime = waterTime;          // share the wave clock
  r.material.uniforms.tNormal.value = waterNormals;

// ===== AUSTRIAN VILLAGE (procedural toon — gabled houses, shutters, onion-dome chapels) =====

// ===== FESTIVAL CROWD (instanced — thousands of spectators line the course) =====
function lowerBound(arr, n, val) {
  let lo = 0, hi = n;
  while (lo < hi) { const m = (lo + hi) >> 1; if (arr[m] < val) lo = m + 1; else hi = m; }
  return lo;
}

let crowdN = 0, crowdBody = null;
let crowdZ, crowdAmp, crowdFreq, crowdPhase;
let crowdHype = 0;
let crowdPrevLo = 0, crowdPrevHi = 0;
let crowdArmL = null, crowdArmR = null, crowdArmSlot = null, crowdArmN = 0;
const crowdFlagSpots = [];

(function buildCrowd() {
  // Zones: [zStart, zEnd, stepMin, stepRand, rows, fillChance]
  const zones = [
    [-25,  60, 0.85, 0.55, 4, 1.00],  // launch ramp — packed
    [ 60, 760, 1.50, 1.30, 3, 0.78],  // along the course — busy with gaps
    [760, 880, 0.90, 0.50, 3, 1.00],  // finish line — packed
    [880, 1480, 2.60, 1.60, 2, 0.60], // tail — thinning out
  ];
  const spots = [];
  for (const [z0, z1, step, stepR, rows, fill] of zones) {
    for (let z = z0; z < z1; z += step + Math.random() * stepR) {
      for (const side of [-1, 1]) {
        for (let row = 0; row < rows; row++) {
          if (Math.random() > fill) continue;
          const offset = RIVER_WIDTH / 2 + 1.7 + row * 1.15 + (Math.random() - 0.5) * 0.7;
          spots.push({
            x: side * offset,
            z: z + (Math.random() - 0.5) * 0.8,
            yaw: (side > 0 ? Math.PI / 2 : -Math.PI / 2) + (Math.random() - 0.5) * 0.7,
          });
        }
      }
    }
  }
  if (spots.length > 3600) spots.length = 3600;
  crowdN = spots.length;

  // Rounder, friendlier figures: tapered torso, smooth head, hair/hat cap
  const legsGeo = new THREE.CylinderGeometry(0.15, 0.13, 0.36, 7); legsGeo.translate(0, 0.18, 0);
  const bodyGeo = new THREE.CylinderGeometry(0.215, 0.15, 0.54, 9); bodyGeo.translate(0, 0.63, 0);
  const headGeo = new THREE.SphereGeometry(0.16, 10, 8);  headGeo.translate(0, 1.05, 0);

  const mkMat = () => new THREE.MeshToonMaterial({ color: 0xffffff, gradientMap: gradientMap3 });
  const legs = new THREE.InstancedMesh(legsGeo, mkMat(), crowdN);
  crowdBody = new THREE.InstancedMesh(bodyGeo, mkMat(), crowdN);
  const heads = new THREE.InstancedMesh(headGeo, mkMat(), crowdN);
  const hair = new THREE.InstancedMesh(hairGeo, mkMat(), crowdN);
  // One figure = one matrix: legs, heads & hair reuse the body's instance buffer
  legs.instanceMatrix = crowdBody.instanceMatrix;
  heads.instanceMatrix = crowdBody.instanceMatrix;
  hair.instanceMatrix = crowdBody.instanceMatrix;

  // Raised cheering arms for a chunk of the jumpers (own buffer, y-synced)
  const armLGeo = new THREE.BoxGeometry(0.36, 0.11, 0.11); armLGeo.rotateZ(0.85); armLGeo.translate(-0.31, 1.16, 0);
  const armRGeo = new THREE.BoxGeometry(0.36, 0.11, 0.11); armRGeo.rotateZ(-0.85); armRGeo.translate(0.31, 1.16, 0);
  crowdArmL = new THREE.InstancedMesh(armLGeo, mkMat(), crowdN);
  crowdArmR = new THREE.InstancedMesh(armRGeo, mkMat(), crowdN);
  crowdArmR.instanceMatrix = crowdArmL.instanceMatrix;
  crowdArmSlot = new Int32Array(crowdN).fill(-1);

  const shirt = [0xFF6644, 0x44AAFF, 0xFFDD22, 0x66DD66, 0xFF44AA, 0xAA44FF, 0xFFFFFF, 0xFF8833, 0x33CCC4, 0xEE3B3B]
    .map(c => new THREE.Color(c));
  const pants = [0x2B3A4A, 0x4A3A2B, 0x33424E, 0x6B4A33, 0x444455].map(c => new THREE.Color(c));
  const skin = [0xFFCC88, 0xE8B070, 0xC98A50, 0x8C5A2E, 0xFFD9A0].map(c => new THREE.Color(c));
  // Hair browns/blacks/greys + a few bright caps/hats — kills the bald look
  const hairCol = [0x3A2A1A, 0x5A3A22, 0x8A6A3A, 0x222222, 0x6B6B6B, 0xC9A24B,
                   0xEE3B3B, 0x3BA4E8, 0xFFC41F, 0xF6FAFC].map(c => new THREE.Color(c));

  crowdZ = new Float32Array(crowdN);
  crowdAmp = new Float32Array(crowdN);
  crowdFreq = new Float32Array(crowdN);
  crowdPhase = new Float32Array(crowdN);
  const dummy = new THREE.Object3D();
  spots.forEach((p, i) => {
    dummy.position.set(p.x, PROM_Y, p.z);
    dummy.rotation.set(0, p.yaw, 0);
    dummy.scale.setScalar(0.85 + Math.random() * 0.35);
    dummy.updateMatrix();
    crowdBody.setMatrixAt(i, dummy.matrix);
    crowdBody.setColorAt(i, shirt[(Math.random() * shirt.length) | 0]);
    legs.setColorAt(i, pants[(Math.random() * pants.length) | 0]);
    const skinTone = skin[(Math.random() * skin.length) | 0];
    heads.setColorAt(i, skinTone);
    hair.setColorAt(i, hairCol[(Math.random() * hairCol.length) | 0]);
    crowdZ[i] = p.z;
    crowdAmp[i] = Math.random() < 0.62 ? 0.10 + Math.random() * 0.32 : 0; // jumpers vs standers
    crowdFreq[i] = 2.0 + Math.random() * 1.7;
    crowdPhase[i] = Math.random() * Math.PI * 2;
    if (crowdAmp[i] > 0 && Math.random() < 0.5) {
      crowdArmSlot[i] = crowdArmN;
      crowdArmL.setMatrixAt(crowdArmN, dummy.matrix);
      crowdArmL.setColorAt(crowdArmN, skinTone);
      crowdArmR.setColorAt(crowdArmN, skinTone);
      crowdArmN++;
    }
    if (i % 23 === 0) {
      crowdFlagSpots.push({ x: p.x, z: p.z, yaw: p.yaw, phase: Math.random() * Math.PI * 2 });
    }
  });
  crowdArmL.count = crowdArmN;
  crowdArmR.count = crowdArmN;
  for (const m of [legs, crowdBody, heads, hair, crowdArmL, crowdArmR]) {
    m.castShadow = m !== crowdArmL && m !== crowdArmR;
    m.frustumCulled = false;
    scene.add(m);
  }
})();

// Crowd jumping/cheering — only figures near the action animate each frame
function updateCrowd(time, dt) {
  if (!crowdBody) return;
  crowdHype = Math.max(0, crowdHype - dt);
  const focusZ = craftGroup.position.z;
  const arr = crowdBody.instanceMatrix.array;
  const aArr = crowdArmL.instanceMatrix.array;
  const lo = lowerBound(crowdZ, crowdN, focusZ - 90);
  const hi = lowerBound(crowdZ, crowdN, focusZ + 130);
  for (let i = crowdPrevLo; i < crowdPrevHi; i++) {
    if (i < lo || i >= hi) {
      arr[i * 16 + 13] = PROM_Y;
      if (crowdArmSlot[i] >= 0) aArr[crowdArmSlot[i] * 16 + 13] = PROM_Y;
    }
  }
  const hype = 1 + crowdHype * 0.9;
  for (let i = lo; i < hi; i++) {
    const a = crowdAmp[i];
    if (a === 0) continue;
    // Stadium wave: a cheer crest travels down the banks
    const wave = 0.55 + 0.45 * Math.sin(crowdZ[i] * 0.045 - time * 6.0);
    const y = PROM_Y + Math.abs(Math.sin(time * crowdFreq[i] + crowdPhase[i])) * a * hype * wave;
    arr[i * 16 + 13] = y;
    if (crowdArmSlot[i] >= 0) aArr[crowdArmSlot[i] * 16 + 13] = y;
  }
  crowdBody.instanceMatrix.needsUpdate = true;
  crowdArmL.instanceMatrix.needsUpdate = true;
  crowdPrevLo = lo; crowdPrevHi = hi;
}

    c.v.set((Math.random() - 0.5) * 4, 2.5 + Math.random() * 3.5, 0.5 + Math.random() * 3.5);
    c.r.set(Math.random() * Math.PI, Math.random() * Math.PI, Math.random() * Math.PI);

const confettiDummy = new THREE.Object3D();

  if (!confettiActive) return;

  confetti.forEach((c, i) => {
    c.v.y -= 2.6 * dt;
    c.v.multiplyScalar(0.995);
    c.p.addScaledVector(c.v, dt);
    c.r.x += c.s.x * dt; c.r.y += c.s.y * dt; c.r.z += c.s.z * dt;

const craftGroup = new THREE.Group();

const CRAFT_TARGET_LENGTH = 2.8;

// Placeholder (shown while GLB loads)
const placeholderFuselage = new THREE.Mesh(
  new THREE.BoxGeometry(0.8, 0.5, 2.0), toonMat(0xFF4444, true)
);

let currentGLBModel = null;
let isLoadingCraft = false;

function buildCraft() {
  const craft = CRAFTS[currentCraftIdx];
  if (currentSkinIdx >= craft.skins.length) currentSkinIdx = 0;
  const skin = craft.skins[currentSkinIdx];

  if (currentGLBModel) { craftGroup.remove(currentGLBModel); currentGLBModel = null; }
  placeholderFuselage.visible = true;
  isLoadingCraft = true;

  loadGLB(skin.file).then((model) => {
    toonifyModel(model);
    scene.add(model);

    // Apply per-skin rotation
    model.rotation.y = skin.rotY || 0;

    let box = new THREE.Box3().setFromObject(model);
    let size = box.getSize(new THREE.Vector3());

    // Scale by the longest horizontal axis (these crafts have wings wider than long)
    const longest = Math.max(size.x, size.z);
    const s = CRAFT_TARGET_LENGTH / Math.max(longest, 0.01);
    model.scale.multiplyScalar(s);

    box.setFromObject(model);
    const center = box.getCenter(new THREE.Vector3());
    model.position.x -= center.x;
    model.position.z -= center.z;
    model.position.y -= box.min.y;

    scene.remove(model);
    placeholderFuselage.visible = false;
    currentGLBModel = model;
    craftGroup.add(model);
    isLoadingCraft = false;
    console.log('Craft loaded:', craft.name, skin.name);
  }).catch((err) => {
    console.error('GLB load failed:', skin.file, err);
    placeholderFuselage.visible = true;
    isLoadingCraft = false;
  });
}

  bandL.visible = show;

  const lPost = new THREE.Vector3(-1.5, RAMP_HEIGHT + 3, 1);
  const rPost = new THREE.Vector3(1.5, RAMP_HEIGHT + 3, 1);
  [bandL, bandR].forEach((band, i) => {
    const post = i === 0 ? lPost : rPost;
    const mid = new THREE.Vector3().addVectors(post, craftPos).multiplyScalar(0.5);
    band.position.copy(mid);
    const dir = new THREE.Vector3().subVectors(craftPos, post);
    const len = dir.length();
    band.scale.y = len;
    band.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), dir.normalize());
  });
}

  for (let i = 0; i < previewDots.length; i++) {
    vy -= GRAVITY * dt;
    px += vx * dt; py += vy * dt; pz += vz * dt;
    previewDots[i].position.set(px, Math.max(py, 0), pz);
    previewDots[i].visible = py > 0;
  }
}

// ===== SPLASH PARTICLES =====
const splashParticles = [];
for (let i = 0; i < 25; i++) {
  const p = new THREE.Mesh(
    new THREE.SphereGeometry(0.12 + Math.random() * 0.1, 6, 6),
    toonMat(0x88DDEE)
  );
  p.visible = false;
  scene.add(p);
  splashParticles.push({ mesh: p, vel: new THREE.Vector3(), life: 0 });
}

function triggerSplashEffect(x, y, z, speed) {
  splashParticles.forEach(p => {
    p.mesh.visible = true;
    p.mesh.position.set(x, 0.5, z);
    const angle = Math.random() * Math.PI * 2;
    const upForce = 3 + Math.random() * speed * 0.3;
    const outForce = 1 + Math.random() * 2;
    p.vel.set(Math.cos(angle) * outForce, upForce, Math.sin(angle) * outForce);
    p.life = 1.5 + Math.random() * 0.5;
  });
}

function updateSplashParticles(dt) {
  splashParticles.forEach(p => {
    if (p.life <= 0) { p.mesh.visible = false; return; }
    p.vel.y -= GRAVITY * dt;
    p.mesh.position.add(p.vel.clone().multiplyScalar(dt));
    if (p.mesh.position.y < 0) p.mesh.position.y = 0;
    p.life -= dt;
    p.mesh.material.opacity = Math.min(p.life, 1);
    p.mesh.material.transparent = true;
  });
}

// ===== WIND TRAIL PARTICLES =====
const trailParticles = [];
for (let i = 0; i < 8; i++) {
  const p = new THREE.Mesh(
    new THREE.SphereGeometry(0.06, 4, 4),
    new THREE.MeshBasicMaterial({ color: 0xFFFFFF, transparent: true, opacity: 0.5 })
  );
  p.visible = false;
  scene.add(p);
  trailParticles.push({ mesh: p, life: 0 });
}
let trailIdx = 0;
function spawnTrail(x, y, z) {
  const p = trailParticles[trailIdx % trailParticles.length];
  p.mesh.position.set(x + (Math.random() - 0.5) * 0.3, y + (Math.random() - 0.5) * 0.2, z);
  p.mesh.visible = true;
  p.life = 0.6;
  trailIdx++;
}
function updateTrailParticles(dt) {
  trailParticles.forEach(p => {
    if (p.life <= 0) { p.mesh.visible = false; return; }
    p.life -= dt;
    p.mesh.material.opacity = p.life;
    p.mesh.scale.setScalar(1 + (0.6 - p.life) * 2);
  });
}

// ===== ENGINE BOOST PARTICLES =====
const boostParticles = [];
for (let i = 0; i < 6; i++) {
  const p = new THREE.Mesh(

let boostIdx = 0;
function spawnBoostParticle(x, y, z) {

  p.mesh.position.set(x + (Math.random()-0.5)*0.2, y + (Math.random()-0.5)*0.2, z - 0.5);
  p.mesh.visible = true;

  boostIdx++;
}
function updateBoostParticles(dt) {
  boostParticles.forEach(p => {
    if (p.life <= 0) { p.mesh.visible = false; return; }
    p.life -= dt;
    p.mesh.material.opacity = p.life * 2;
    p.mesh.scale.setScalar(1 + (0.4 - p.life) * 3);

}

// ===== GAME STATE =====
let gameState = 'TITLE';
let pos = { x: 0, y: 0, z: 0 };
let vel = { x: 0, y: 0, z: 0 };
let pitch = 0;
let pitchInput = 0;
let fuel = 0;
let boostActive = false;
let flightDistance = 0;
let maxAltitude = 0;
let maxSpeed = 0;
let coinsEarned = 0;
let lastMilestone = 0;
let trailTimer = 0;
let boostTimer = 0;

// Slingshot state
let isDragging = false;
let dragStartX = 0, dragStartY = 0;
let aimPower = 0, aimAngle = 20 * DEG2RAD;

// Camera targets
let camTarget = new THREE.Vector3(0, RAMP_HEIGHT + 5, -10);
let camLookTarget = new THREE.Vector3(0, RAMP_HEIGHT, 5);
let camLerp = 0.05;

const CRAFT_REST_POS = new THREE.Vector3(0, RAMP_HEIGHT + 0.5, -1);

// ===== SCREEN MANAGEMENT =====
const screens = ['screen-title', 'screen-garage', 'screen-aim-hud', 'screen-flight-hud', 'screen-splash', 'screen-results'];
function showScreen(id) {
  screens.forEach(s => document.getElementById(s).classList.remove('active'));
  if (id) document.getElementById(id).classList.add('active');
}

function showFloatText(text, screenX, screenY) {
  const el = document.createElement('div');
  el.className = 'float-text';
  el.textContent = text;
  el.style.left = screenX + 'px';
  el.style.top = screenY + 'px';
  document.getElementById('float-layer').appendChild(el);
  setTimeout(() => el.remove(), 1200);
}

// Animated number roll-up (results coins, etc.)
function tickNumber(el, from, to, ms, prefix = '') {
  const t0 = performance.now();
  function step(t) {
    const k = Math.min(1, (t - t0) / ms);
    const e = 1 - Math.pow(1 - k, 3);
    el.textContent = prefix + Math.round(from + (to - from) * e);
    if (k < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

// Restart a CSS pop-in animation on an element
function popIn(el, cls = 'pop') {
  el.classList.remove(cls);
  void el.offsetWidth;
  el.classList.add(cls);
}

// ===== STATE TRANSITIONS =====
function setState(state) {
  gameState = state;
  switch (state) {
    case 'TITLE':
      showScreen('screen-title');
      craftGroup.position.copy(CRAFT_REST_POS);
      craftGroup.rotation.set(0, 0, 0);
      updateBands(craftGroup.position, false);
      updateTrajectoryPreview(null, null, false);
      camTarget.set(0, RAMP_HEIGHT + 5, -10);
      camLookTarget.set(0, RAMP_HEIGHT, 5);
      camLerp = 0.05;
      if (save.bestDistance > 0) {
        document.getElementById('title-best').textContent = 'BEST: ' + Math.floor(save.bestDistance) + 'm';
      }
      break;

    case 'GARAGE':
      showScreen('screen-garage');
      craftGroup.position.copy(CRAFT_REST_POS);
      craftGroup.rotation.set(0, 0, 0);
      updateBands(craftGroup.position, false);
      updateTrajectoryPreview(null, null, false);
      // Camera: hero framing — closer, 3/4 front view of the craft
      camTarget.set(3.5, RAMP_HEIGHT + 2.2, -4.5);
      camLookTarget.set(0, RAMP_HEIGHT + 1.2, -1.5);
      camLerp = 0.06;
      renderGarage();
      popIn(document.querySelector('.ss-garage-panel'));
      break;

    case 'READY':
      showScreen('screen-aim-hud');
      document.getElementById('aim-text').textContent = 'DRAG TO LAUNCH';
      document.getElementById('aim-text').style.display = '';
      document.getElementById('drag-hint').style.display = save.totalFlights === 0 ? '' : 'none';
      document.getElementById('power-text').textContent = '';
      craftGroup.position.copy(CRAFT_REST_POS);
      craftGroup.rotation.set(0, 0, 0);
      updateBands(craftGroup.position, false);
      updateTrajectoryPreview(null, null, false);
      camTarget.set(0, RAMP_HEIGHT + 4, -8);
      camLookTarget.set(0, RAMP_HEIGHT + 1, 2);
      camLerp = 0.05;
      isDragging = false;
      aimPower = 0;
      aimAngle = 20 * DEG2RAD;
      document.getElementById('upgrade-cards').style.display = '';
      renderUpgradeCards();
      break;

    case 'AIMING':
      document.getElementById('aim-text').style.display = 'none';
      document.getElementById('drag-hint').style.display = 'none';
      document.getElementById('upgrade-cards').style.display = 'none';
      break;

    case 'LAUNCH': {
      showScreen('screen-flight-hud');
      const maxSpd = getMaxLaunchSpeed();
      const launchSpeed = aimPower * maxSpd;
      vel.x = 0;
      vel.y = launchSpeed * Math.sin(aimAngle);
      vel.z = launchSpeed * Math.cos(aimAngle);
      pos.x = craftGroup.position.x;
      pos.y = craftGroup.position.y;
      pos.z = craftGroup.position.z;
      pitch = aimAngle * 0.7;
      pitchInput = 0;
      fuel = getMaxFuel();
      boostActive = false;
      flightDistance = 0;
      maxAltitude = pos.y;
      maxSpeed = launchSpeed;
      lastMilestone = 0;
      coinsEarned = 0;
      trailTimer = 0;
      boostTimer = 0;
      updateBands(craftGroup.position, false);
      updateTrajectoryPreview(null, null, false);
      launchConfetti();
      camLerp = 0.12;
      setTimeout(() => { if (gameState === 'LAUNCH') setState('FLIGHT'); }, 300);
      break;
    }

    case 'FLIGHT':
      camLerp = 0.04;
      break;

    case 'SPLASH': {
      showScreen('screen-splash');
      const impactSpeed = Math.sqrt(vel.x * vel.x + vel.y * vel.y + vel.z * vel.z);
      triggerSplashEffect(pos.x, 0, pos.z, impactSpeed);
      triggerSplashRings(pos.x, pos.z);
      crowdHype = 2.5; // crowd goes wild
      boostActive = false;
      document.getElementById('btn-boost').classList.remove('held');
      vel.x = 0; vel.y = 0; vel.z = 0;
      pos.y = 0;
      craftGroup.position.set(pos.x, 0.3, pos.z);

      // Calculate coins
      flightDistance = Math.max(0, pos.z);
      coinsEarned = Math.floor((flightDistance / 5 + maxAltitude / 2) * getIncomeMulti());

      camLerp = 0.02;
      setTimeout(() => { if (gameState === 'SPLASH') setState('RESULTS'); }, 1800);
      break;
    }

    case 'RESULTS': {
      showScreen('screen-results');
      save.coins += coinsEarned;
      save.totalDistance += flightDistance;
      save.totalFlights++;
      const isNewRecord = flightDistance > save.bestDistance;
      if (isNewRecord) save.bestDistance = flightDistance;
      const justClearedLevel = !save.levelComplete && flightDistance >= save.levelTarget;
      if (justClearedLevel) save.levelComplete = true;
      writeSave();

      document.getElementById('res-dist').textContent = Math.floor(flightDistance) + 'm';
      document.getElementById('res-alt').textContent = Math.floor(maxAltitude) + 'm';
      document.getElementById('res-speed').textContent = Math.floor(maxSpeed) + ' m/s';
      tickNumber(document.getElementById('res-coins'), 0, coinsEarned, 900, '+');
      document.getElementById('res-best').textContent = isNewRecord ? '' : 'BEST: ' + Math.floor(save.bestDistance) + 'm';
      if (isNewRecord) {
        document.getElementById('res-best').innerHTML = '<span class="new-record">NEW RECORD!</span>';
      }

      // Level-clear ribbon — shown once, then persists as a "cleared" chip on future runs.
      const card = document.querySelector('.results-card');
      const existing = card.querySelector('.ss-level-ribbon');
      if (existing) existing.remove();
      if (justClearedLevel) {
        const ribbon = document.createElement('div');
        ribbon.className = 'ss-ribbon ss-level-ribbon';
        ribbon.textContent = 'LEVEL 1 CLEARED!';
        ribbon.style.cssText = 'background:linear-gradient(180deg,#FFB066,var(--ss-orange-500));margin:0 auto 12px;display:block;width:fit-content;';
        card.prepend(ribbon);
      } else if (save.levelComplete) {
        const chip = document.createElement('div');
        chip.className = 'ss-ribbon ss-level-ribbon';
        chip.textContent = 'LEVEL 1 CLEAR';
        chip.style.cssText = 'background:linear-gradient(180deg,var(--ss-green-300),var(--ss-green-500));margin:0 auto 12px;display:block;width:fit-content;font-size:15px;padding:5px 16px;';
        card.prepend(chip);
      }
      popIn(card);
      break;
    }

  }

  // Jumbotron reacts to the event state
  switch (state) {
    case 'TITLE':   drawJumbo('FLUGTAG', 'SALZBURG'); break;
    case 'GARAGE':  drawJumbo('PICK YOUR', 'CRAFT!'); break;
    case 'READY':   drawJumbo('DRAG TO', 'LAUNCH!'); break;
    case 'LAUNCH':  drawJumbo('GO!'); break;
    case 'SPLASH':  drawJumbo('SPLASH!'); break;
    case 'RESULTS': drawJumbo(Math.floor(flightDistance) + 'm',
      flightDistance >= save.bestDistance ? 'NEW RECORD!' : 'NICE FLIGHT!'); break;
  }
}

function selectCraft(idx) {
  currentCraftIdx = idx;
  currentSkinIdx = 0;
  save.craftIdx = idx; save.skinIdx = 0; writeSave();
  buildCraft(); renderGarage(); craftGroup.rotation.y = 0;
}
function selectSkin(idx) {
  currentSkinIdx = idx;
  save.skinIdx = idx; writeSave();
  buildCraft(); renderGarage(); craftGroup.rotation.y = 0;
}

function renderGarage() {
  document.getElementById('garage-coins').textContent = save.coins;

  const craft = CRAFTS[currentCraftIdx];
  document.getElementById('craft-name').textContent = craft.name.toUpperCase();
  document.getElementById('craft-subtitle').textContent = craft.subtitle || '';

  // Craft grid
  const grid = document.getElementById('craft-grid');
  grid.innerHTML = '';
  CRAFTS.forEach((c, i) => {
    const card = document.createElement('div');

    card.innerHTML = '<span>' + c.icon + '</span><span class="ss-craft-label">' + c.name + '</span>';

      tab.textContent = s.name;
      tab.addEventListener('click', (e) => { e.stopPropagation(); selectSkin(i); });
      tabs.appendChild(tab);
    });
  }
}

// ===== UPGRADE CARDS RENDERING =====
function renderUpgradeCards() {
  document.getElementById('aim-coins').textContent = save.coins;
  const best = save.bestDistance;
  document.getElementById('aim-best').textContent = best > 0 ? ('BEST ' + Math.floor(best) + 'm') : '';

  // Level progress bar
  const pct = Math.min(100, (save.bestDistance / save.levelTarget) * 100);
  const fill = document.getElementById('level-progress-fill');
  fill.style.width = pct + '%';
  fill.classList.toggle('complete', save.levelComplete);
  document.getElementById('level-progress-text').textContent =
    Math.floor(save.bestDistance) + ' / ' + save.levelTarget + 'm';

  const container = document.getElementById('upgrade-cards');
  container.innerHTML = '';

  Object.entries(UPGRADES).forEach(([key, def]) => {
    const level = save.upgrades[key];
    const cost = getUpgradeCost(key);
    const isMax = level >= MAX_UPGRADE_LEVEL;
    const canBuy = !isMax && save.coins >= cost;

    let dotsHTML = '';
    for (let i = 0; i < MAX_UPGRADE_LEVEL; i++) {
      dotsHTML += `<div class="upg-card-dot${i < level ? ' filled' : ''}"></div>`;
    }

    const card = document.createElement('div');
    card.className = 'upg-card';
    card.dataset.track = key;
    card.innerHTML = `
      <div class="upg-card-title">${def.name}</div>
      <div class="upg-card-icon">${def.icon}</div>
      <div class="upg-card-dots">${dotsHTML}</div>
      <button class="upg-card-btn ${isMax ? 'maxed' : (!canBuy ? 'disabled' : '')}"
              data-key="${key}" data-cost="${cost}">
        ${isMax ? 'MAX' : '<span class="upg-coin"></span>' + cost}
      </button>`;
    container.appendChild(card);
  });

  // Bind buy buttons
  container.querySelectorAll('.upg-card-btn:not(.disabled):not(.maxed)').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const key = btn.dataset.key;
      const cost = parseInt(btn.dataset.cost);
      if (save.coins >= cost && save.upgrades[key] < MAX_UPGRADE_LEVEL) {
        save.coins -= cost;
        save.upgrades[key]++;
        writeSave();
        renderUpgradeCards();
        // Float text feedback
        const rect = btn.getBoundingClientRect();
        showFloatText('+1 ' + UPGRADES[key].name, rect.left + rect.width/2, rect.top);
      }
    });
  });
}

// ===== INPUT HANDLING =====
function getInputPos(e) {
  if (e.touches) return { x: e.touches[0].clientX, y: e.touches[0].clientY };
  return { x: e.clientX, y: e.clientY };
}
function getEndPos(e) {
  if (e.changedTouches) return { x: e.changedTouches[0].clientX, y: e.changedTouches[0].clientY };
  return { x: e.clientX, y: e.clientY };
}

// The whole screen is the drag surface — only real controls are excluded,
// so a drag can start over HUD chips, cards, or empty UI without dying.
function isUITarget(e) {
  return !!(e.target && e.target.closest &&
    e.target.closest('button, .ss-craft-card, .ss-skin-tab'));
}

window.addEventListener('mousedown', (e) => { if (isUITarget(e)) return; onDragStart(e); });
window.addEventListener('touchstart', (e) => {
  if (isUITarget(e)) return; // let buttons receive their tap
  e.preventDefault();
  onDragStart(e);
}, { passive: false });
window.addEventListener('mousemove', onDragMove);
window.addEventListener('touchmove', (e) => { if (isDragging) e.preventDefault(); onDragMove(e); }, { passive: false });
window.addEventListener('mouseup', onDragEnd);
window.addEventListener('touchend', (e) => { onDragEnd(e); });

function onDragStart(e) {
  if (gameState === 'READY' || gameState === 'AIMING') {
    const p = getInputPos(e);
    dragStartX = p.x;
    dragStartY = p.y;
    isDragging = true;
    setState('AIMING');
  }
  // LAUNCH counts too: a touch during the 300ms launch transition used to be
  // swallowed, making early pitch control feel dead.
  if (gameState === 'FLIGHT' || gameState === 'LAUNCH') {
    const p = getInputPos(e);
    dragStartY = p.y;
    isDragging = true;
  }
}

function onDragMove(e) {
  if (!isDragging) return;
  const p = getInputPos(e);

  if (gameState === 'AIMING') {
    // Pull back = drag down/back on screen
    const dx = dragStartX - p.x;
    const dy = dragStartY - p.y;
    const pullDist = Math.min(Math.sqrt(dx * dx + dy * dy), MAX_PULL_PX);
    aimPower = pullDist / MAX_PULL_PX;

    // Angle from drag direction (more upward drag = steeper angle)
    const rawAngle = Math.atan2(Math.abs(dy), Math.max(Math.abs(dx), 1));
    aimAngle = Math.max(10 * DEG2RAD, Math.min(50 * DEG2RAD, rawAngle));

    // Move craft slightly backward on ramp to show pull
    const pullBack = aimPower * 2;
    craftGroup.position.set(
      CRAFT_REST_POS.x,
      CRAFT_REST_POS.y - pullBack * Math.sin(RAMP_ANGLE),
      CRAFT_REST_POS.z - pullBack * Math.cos(RAMP_ANGLE)
    );
    craftGroup.rotation.x = -aimAngle * 0.3;

    updateBands(craftGroup.position, true);

    // Trajectory preview
    const maxSpd = getMaxLaunchSpeed();
    const launchSpeed = aimPower * maxSpd;
    const previewVel = {
      x: 0,
      y: launchSpeed * Math.sin(aimAngle),
      z: launchSpeed * Math.cos(aimAngle),
    };
    updateTrajectoryPreview(craftGroup.position, previewVel, aimPower > 0.05);

    document.getElementById('power-text').textContent =
      'POWER: ' + Math.floor(aimPower * 100) + '%  ANGLE: ' + Math.floor(aimAngle / DEG2RAD) + '\u00B0';
  }

  if (gameState === 'FLIGHT' || gameState === 'LAUNCH') {
    // Vertical drag for pitch
    const dy = dragStartY - p.y;
    pitchInput = Math.max(-1, Math.min(1, dy / 70));
  }
}

function onDragEnd(e) {
  if (gameState === 'AIMING' && isDragging && aimPower > 0.1) {
    setState('LAUNCH');
  } else if (gameState === 'AIMING') {
    setState('READY');
  }
  if (gameState === 'FLIGHT' || gameState === 'LAUNCH') {
    pitchInput = 0;
  }
  isDragging = false;
}

// Keyboard input
document.addEventListener('keydown', (e) => {
  if (gameState === 'FLIGHT') {
    if (e.key === 'ArrowUp' || e.key === 'w') pitchInput = 1;
    if (e.key === 'ArrowDown' || e.key === 's') pitchInput = -1;
    if (e.key === ' ') boostActive = true;
  }
});
document.addEventListener('keyup', (e) => {
  if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'ArrowDown' || e.key === 's') pitchInput = 0;
  if (e.key === ' ') boostActive = false;
});

document.getElementById('btn-play').addEventListener('click', () => setState('GARAGE'));
document.getElementById('btn-fly-again').addEventListener('click', () => setState('READY'));
document.getElementById('btn-garage').addEventListener('click', () => setState('GARAGE'));

// Hold-to-boost button (touch parity with the spacebar)
const boostBtn = document.getElementById('btn-boost');
function boostDown(e) {
  e.preventDefault();
  e.stopPropagation();
  if (gameState === 'FLIGHT' || gameState === 'LAUNCH') {
    boostActive = true;
    boostBtn.classList.add('held');

// ===== FLIGHT PHYSICS UPDATE =====
function updateFlightPhysics(dt) {
  // Pitch control
  const targetPitch = pitchInput * MAX_PITCH;
  const GLIDE_PITCH = 5 * DEG2RAD; // natural glide angle (slight nose-up)
  if (Math.abs(pitchInput) > 0.01) {
    pitch += (targetPitch - pitch) * Math.min(PITCH_SPEED * dt * 3, 1);
  } else {
    // Auto-stabilize toward natural glide angle, not zero
    pitch += (GLIDE_PITCH - pitch) * AUTO_STABILIZE * dt;
  }
  pitch = Math.max(-MAX_PITCH, Math.min(MAX_PITCH * 1.2, pitch));

  const speed = Math.sqrt(vel.x * vel.x + vel.y * vel.y + vel.z * vel.z);
  if (speed < 0.5) { triggerSplashFromFlight(); return; }

  // Angle of attack
  const velAngle = Math.atan2(vel.y, vel.z);
  let aoa = pitch - velAngle;
  aoa = Math.max(-Math.PI / 4, Math.min(Math.PI / 4, aoa));

  // Stall: reduce lift at extreme AoA
  let stallFactor = 1.0;
  const absAoA = Math.abs(aoa);
  if (absAoA > 20 * DEG2RAD) {
    stallFactor = Math.max(0.1, 1.0 - (absAoA - 20 * DEG2RAD) / (25 * DEG2RAD));
  }

  // Low speed lift reduction (gentle curve)
  let speedLiftFactor = Math.min(1.0, speed / 5);

  // Lift
  const liftCoeff = getLiftCoeff();
  const wingArea = getWingArea();
  const liftMag = 0.5 * AIR_DENSITY * speed * speed * wingArea * liftCoeff * Math.sin(2 * aoa) * stallFactor * speedLiftFactor;

  // Lift direction: perpendicular to velocity in YZ plane
  const liftY = liftMag * (vel.z / speed);
  const liftZ = liftMag * (-vel.y / speed);

  // Drag
  const dragCoeff = getDragCoeff();
  const dragMag = 0.5 * AIR_DENSITY * speed * speed * wingArea * dragCoeff;
  const dragY = -dragMag * (vel.y / speed);
  const dragZ = -dragMag * (vel.z / speed);

  // Engine thrust — hold BOOST (button or spacebar) to burn fuel
  let thrustY = 0, thrustZ = 0;
  if (fuel > 0 && boostActive) {
    const thrust = getEngineThrust();
    if (thrust > 0) {
      thrustY = thrust * Math.sin(pitch) * 0.5;
      thrustZ = thrust * Math.cos(pitch);
      fuel -= dt;
      if (fuel < 0) fuel = 0;
    }
  }

  // Apply forces
  vel.y += (liftY + dragY + thrustY - GRAVITY) * dt;
  vel.z += (liftZ + dragZ + thrustZ) * dt;

  // Clamp max speed
  const newSpeed = Math.sqrt(vel.y * vel.y + vel.z * vel.z);
  if (newSpeed > 80) {
    const factor = 80 / newSpeed;
    vel.y *= factor; vel.z *= factor;
  }

  // Update position
  pos.x += vel.x * dt;
  pos.y += vel.y * dt;
  pos.z += vel.z * dt;

  // Track stats
  flightDistance = Math.max(0, pos.z);
  if (pos.y > maxAltitude) maxAltitude = pos.y;
  const curSpeed = Math.sqrt(vel.y * vel.y + vel.z * vel.z);
  if (curSpeed > maxSpeed) maxSpeed = curSpeed;

  // Altitude ceiling — keep the game visually grounded
  const MAX_ALTITUDE = 50;
  if (pos.y > MAX_ALTITUDE) {
    pos.y = MAX_ALTITUDE;
    if (vel.y > 0) vel.y *= 0.5; // dampen upward velocity
  }

  // Splash check
  if (pos.y <= 0) {
    triggerSplashFromFlight();
    return;
  }

  // Update craft position and rotation
  craftGroup.position.set(pos.x, pos.y, pos.z);
  craftGroup.rotation.x = -pitch;


  // Wind trail + water spray when skimming low
  trailTimer += dt;
  if (trailTimer > 0.08 && curSpeed > 3) {
    spawnTrail(pos.x, pos.y, pos.z - 1.5);
    if (pos.y < 2.4) spawnTrail(pos.x + (Math.random() - 0.5) * 0.8, 0.25, pos.z - 0.8);
    trailTimer = 0;
  }

  // Boost particles — only while the engine is actually firing
  if (boostActive && fuel > 0 && getEngineThrust() > 0) {
    boostTimer += dt;
    if (boostTimer > 0.05) {
      spawnBoostParticle(pos.x, pos.y, pos.z - 1.2);
      boostTimer = 0;
    }
  }

  // Distance milestones
  const currentMilestone = Math.floor(flightDistance / 50) * 50;
  if (currentMilestone > lastMilestone && currentMilestone > 0) {
    lastMilestone = currentMilestone;
    showFloatText(currentMilestone + 'm!', window.innerWidth / 2, window.innerHeight / 3);
  }

  // Update HUD
  document.getElementById('hud-dist').textContent = Math.floor(flightDistance) + 'm';
  document.getElementById('hud-alt').textContent = 'ALT ' + Math.floor(pos.y) + 'm';
  document.getElementById('hud-speed').textContent = 'SPD ' + Math.floor(curSpeed);
  const fuelPct = getMaxFuel() > 0 ? (fuel / getMaxFuel()) * 100 : 0;
  document.getElementById('hud-boost').style.width = fuelPct + '%';
  document.getElementById('btn-boost').classList.toggle('empty', fuel <= 0);
  const coinsSoFar = Math.floor((flightDistance / 5 + maxAltitude / 2) * getIncomeMulti());
  document.getElementById('hud-coins').textContent = coinsSoFar;
}

function triggerSplashFromFlight() {
  pos.y = 0;
  setState('SPLASH');
}

// ===== CAMERA UPDATE =====
function updateCamera(dt) {
  if (gameState === 'FLIGHT' || gameState === 'LAUNCH') {
    camTarget.set(pos.x * 0.3, pos.y + 3, pos.z - 8);
    camLookTarget.set(pos.x * 0.2, pos.y + 0.5, pos.z + 15);
  } else if (gameState === 'SPLASH') {
    camTarget.set(pos.x, 4, pos.z - 10);
    camLookTarget.set(pos.x, 0.5, pos.z);
  }
  camera.position.lerp(camTarget, camLerp);
  const lookAt = new THREE.Vector3();
  lookAt.copy(camera.userData.lookAt || camLookTarget);
  lookAt.lerp(camLookTarget, camLerp);
  camera.userData.lookAt = lookAt;
  camera.lookAt(lookAt);
}

// ===== CRAFT IDLE ANIMATIONS =====
function updateIdleCraft(time) {
  if (gameState === 'TITLE' || gameState === 'READY') {
    craftGroup.position.y = CRAFT_REST_POS.y + Math.sin(time * 1.5) * 0.05;
  }
  if (gameState === 'GARAGE') {
    craftGroup.rotation.y += 0.008;
    craftGroup.position.y = CRAFT_REST_POS.y + Math.sin(time * 1.2) * 0.06;
  }
}

// ===== MAIN LOOP =====
let lastTime = 0;
function gameLoop(timestamp) {
  requestAnimationFrame(gameLoop);
  const rawDt = (timestamp - lastTime) / 1000;
  lastTime = timestamp;
  const dt = Math.min(rawDt, 1 / 30);
  if (dt < 0.001) return;

  const time = timestamp / 1000;

  switch (gameState) {
    case 'TITLE':
    case 'GARAGE':
    case 'READY':
      updateIdleCraft(time);
      break;
    case 'AIMING':
      break;
    case 'LAUNCH':
    case 'FLIGHT':
      updateFlightPhysics(dt);
      break;
    case 'SPLASH':
      // Craft bobs in water
      craftGroup.position.y = Math.sin(time * 2) * 0.15 + 0.3;
      craftGroup.rotation.z = Math.sin(time * 1.5) * 0.05;
      break;
  }

  updateCamera(dt);
  updateSplashParticles(dt);
  updateTrailParticles(dt);
  updateBoostParticles(dt);
  updateWater(time, dt);
  updateSplashRings(dt);
  updateFestival(time, dt);
  updateSky();
  updateClouds(time);
  updateBirds(time);
  updateSearchlights(time);

  // Live distance on the jumbotron during flight (throttled)
  if (gameState === 'FLIGHT' && time - lastJumboTick > 0.25) {
    drawJumbo(Math.floor(flightDistance) + 'm');
    lastJumboTick = time;
  }

  // Sun + shadow frustum always track the craft
  const cp = craftGroup.position;
  sunLight.position.set(cp.x + 40, 80, cp.z + 30);
  sunLight.target.position.set(cp.x, cp.y, cp.z);
  sunLight.target.updateMatrixWorld();

  composer.render();
}
let lastJumboTick = 0;

// ===== INIT =====
loadSave();
currentCraftIdx = save.craftIdx || 0;
currentSkinIdx = save.skinIdx || 0;
buildCraft();
camera.position.set(0, RAMP_HEIGHT + 5, -10);
camera.userData.lookAt = new THREE.Vector3(0, RAMP_HEIGHT, 5);
camera.lookAt(0, RAMP_HEIGHT, 5);
setState('TITLE');
requestAnimationFrame((t) => { lastTime = t; requestAnimationFrame(gameLoop); });
</script>
