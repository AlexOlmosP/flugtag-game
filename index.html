<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Flugtag - Epic Flying Machine</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Fredoka:wght@500;700&display=swap" rel="stylesheet">
<style>
/* Brand fonts from design system */
@font-face { font-family: 'Slingshot Logo'; src: url('fonts/logo_font.ttf') format('truetype'); font-weight: 400 900; font-display: swap; }
@font-face { font-family: 'Slingshot Body'; src: url('fonts/body_font.ttf') format('truetype'); font-weight: 400 800; font-display: swap; }
@font-face { font-family: 'Slingshot Flavor'; src: url('fonts/flavor_fonts.ttf') format('truetype'); font-weight: 400 800; font-display: swap; }
@font-face { font-family: 'Slingshot Numerals'; src: url('fonts/racing_numerals_fonts.ttf') format('truetype'); font-weight: 400 900; font-display: swap; }

:root {
  /* ===== Sled Surfers Design System ===== */
  --font-display: 'Slingshot Logo', 'Baloo 2', system-ui, sans-serif;
  --font-ui: 'Slingshot Body', 'Fredoka', system-ui, sans-serif;
  --font-flavor: 'Slingshot Flavor', 'Slingshot Logo', system-ui, sans-serif;
  --font-numeric: 'Slingshot Numerals', 'Slingshot Body', system-ui, sans-serif;
  --font-body: var(--font-ui);

  /* Core palette */
  --ss-navy: #163A5F;
  --ss-sky-pale: #E8F4FD;
  --ss-snow-white: #FFFFFF;
  --ss-blue-50: #E3F2FB;
  --ss-blue-300: #6BC0EF;
  --ss-blue-500: #3BA4E8;
  --ss-blue-700: #1565A3;
  --ss-green-300: #A6E47A;
  --ss-green-500: #63C93B;
  --ss-green-700: #3E8D1F;
  --ss-red-500: #EE3B3B;
  --ss-red-700: #A51616;
  --ss-yellow-500: #FFC41F;
  --ss-yellow-700: #C08A00;
  --ss-orange-500: #FF8A1F;
  --ss-orange-700: #B5510A;
  --ss-ink-100: #D8E2EC;
  --ss-ink-500: #5A7691;

  /* Legacy aliases */
  --sky-blue: var(--ss-blue-500);
  --ocean: #0088AA;
  --red: var(--ss-red-500);
  --yellow: var(--ss-yellow-500);
  --green: var(--ss-green-500);
  --white: #FFFFFF;
  --dark: var(--ss-navy);

  /* Shadows & radii */
  --text-shadow: 2px 2px 0 var(--ss-navy);
  --text-shadow-heavy: 1px 1px 0 var(--ss-navy), 0 3px 0 rgba(12,40,70,.35);
  --btn-radius: 20px;
  --r-xl: 28px;
  --ease-pop: cubic-bezier(0.34, 1.56, 0.64, 1);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  position: fixed;
  touch-action: none;
  background: url('Cartoon_panoramic_skyline_202604022029.png') center -35vh / 100% auto no-repeat, linear-gradient(to bottom, #5AABE0 0%, #87CEEB 40%, #B8D4E8 100%);
  font-family: var(--font-body);
}
canvas { display: block; width: 100%; height: 100%; }
.screen {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  opacity: 0; pointer-events: none;
  transition: opacity 0.4s ease;
  z-index: 10;
}
.screen.active { opacity: 1; pointer-events: auto; }
.screen.passthrough { pointer-events: none !important; }
.screen.passthrough .game-btn { pointer-events: auto; }
/* ===== Design System Button (Sled Surfers) ===== */
.game-btn {
  position: relative;
  font-family: var(--font-display);
  font-size: 22px; font-weight: 800;
  color: white;
  -webkit-text-stroke: 1px var(--ss-navy);
  text-shadow: 1px 1px 0 var(--ss-navy), 0 2px 0 rgba(12,40,70,.35);
  background: var(--ss-green-500);
  border: 3px solid var(--ss-navy);
  border-radius: var(--btn-radius);
  padding: 14px 32px;
  min-height: 52px;
  cursor: pointer;
  transition: transform 0.14s ease, box-shadow 0.14s ease;
  box-shadow: 0 6px 0 0 var(--ss-green-700), 0 8px 0 0 var(--ss-navy);
  text-transform: uppercase; letter-spacing: 0.04em;
  -webkit-tap-highlight-color: transparent;
  user-select: none; outline: none;
  overflow: hidden;
}
.game-btn::before {
  content: ""; position: absolute;
  inset: 3px 3px 50% 3px;
  border-radius: calc(var(--btn-radius) - 5px) calc(var(--btn-radius) - 5px) 50% 50%;
  background: linear-gradient(180deg, rgba(255,255,255,.45), rgba(255,255,255,0));
  pointer-events: none;
}
.game-btn:hover { transform: translateY(-2px); }
.game-btn:active {
  transform: translateY(4px);
  box-shadow: 0 2px 0 0 var(--ss-green-700), 0 4px 0 0 var(--ss-navy);
}
.game-btn.secondary {
  background: var(--ss-blue-500);
  box-shadow: 0 6px 0 0 var(--ss-blue-700), 0 8px 0 0 var(--ss-navy);
}
.game-btn.secondary:active {
  box-shadow: 0 2px 0 0 var(--ss-blue-700), 0 4px 0 0 var(--ss-navy);
}
.game-btn.green { background: var(--ss-green-500); }
.game-btn.pulse { animation: btnPulse 1.5s ease-in-out infinite; }
@keyframes btnPulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.05)} }

/* Title Screen */
#screen-title { background: rgba(0,0,0,0.3); }
.title-text {
  font-family: var(--font-flavor); font-size: 84px;
  color: #FFFFFF;
  -webkit-text-stroke: 2px var(--ss-navy);
  text-shadow:
    3px 3px 0 var(--ss-navy),
    -1px -1px 0 var(--ss-navy),
    1px -1px 0 var(--ss-navy),
    -1px 1px 0 var(--ss-navy),
    0 6px 0 rgba(12,40,70,.35);
  text-transform: uppercase; line-height: 1.05; text-align: center;
  letter-spacing: 0.02em;
}
.title-sub {
  font-family: var(--font-ui); font-size: 18px; font-weight: 700;
  color: #FFFFFF;
  text-shadow: 1px 1px 0 var(--ss-navy), 0 2px 0 rgba(12,40,70,.35);
  margin: 12px 0 32px; text-align: center; letter-spacing: 0.02em;
}
.best-distance {
  font-family: var(--font-numeric); font-size: 16px; font-weight: 800;
  color: #FFFFFF;
  -webkit-text-stroke: 0.5px var(--ss-navy);
  text-shadow: 1px 1px 0 var(--ss-navy);
  margin-top: 20px;
}

/* Aim HUD */
#screen-aim-hud { justify-content: flex-end; padding-bottom: 60px; }
.aim-instruction {
  font-family: var(--font-flavor); font-size: 32px;
  color: #FFFFFF;
  -webkit-text-stroke: 1px var(--ss-navy);
  text-shadow: 2px 2px 0 var(--ss-navy), 0 4px 0 rgba(12,40,70,.35);
  text-transform: uppercase; letter-spacing: 0.04em;
  animation: aimBounce 1s ease-in-out infinite;
}
@keyframes aimBounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
.power-display {
  font-family: var(--font-numeric); font-size: 22px; font-weight: 800;
  color: #FFFFFF;
  -webkit-text-stroke: 0.5px var(--ss-navy);
  text-shadow: 1px 1px 0 var(--ss-navy);
  margin-top: 10px;
}

/* Flight HUD */
#screen-flight-hud { pointer-events: none; justify-content: flex-start; }
.hud-top {
  width: 100%; padding: 12px 16px;
  display: flex; justify-content: space-between; align-items: flex-start;
}
.hud-distance {
  font-family: var(--font-numeric); font-size: 40px; font-weight: 900;
  color: #FFFFFF;
  -webkit-text-stroke: 1.5px var(--ss-navy);
  text-shadow: 2px 2px 0 var(--ss-navy), 0 4px 0 rgba(12,40,70,.4);
}
.hud-altitude, .hud-speed {
  font-family: var(--font-numeric); font-size: 15px; font-weight: 800;
  color: #FFFFFF;
  -webkit-text-stroke: 0.5px var(--ss-navy);
  text-shadow: 1px 1px 0 var(--ss-navy);
  letter-spacing: 0.02em;
}
.hud-coins {
  display: inline-flex; align-items: center; gap: 6px;
  height: 36px; padding: 0 14px 0 10px;
  background: #fff; border: 3px solid var(--ss-navy);
  border-radius: 999px;
  box-shadow: 0 3px 0 0 rgba(12,40,70,.2);
  font-family: var(--font-numeric);
  font-weight: 800; font-size: 16px;
  color: var(--ss-navy);
}
.hud-boost-bar {
  width: 120px; height: 14px;
  background: var(--ss-ink-100);
  border: 2px solid var(--ss-navy);
  border-radius: 999px;
  overflow: hidden; margin-top: 6px;
  box-shadow: inset 0 2px 0 rgba(12,40,70,.18);
}
.hud-boost-fill {
  height: 100%;
  background: linear-gradient(180deg, var(--ss-yellow-500), var(--ss-orange-500));
  border-radius: 999px;
  box-shadow: inset 0 2px 0 rgba(255,255,255,.4);
  transition: width 0.1s;
}
.hud-bottom {
  position: absolute; bottom: 16px; left: 16px; right: 16px;
  display: flex; justify-content: space-between;
}

/* Splash Screen */
#screen-splash { background: rgba(0,80,120,0.4); }
.splash-text {
  font-family: var(--font-flavor); font-size: 88px; font-weight: 900;
  color: #FFFFFF;
  -webkit-text-stroke: 2px var(--ss-navy);
  text-shadow:
    3px 3px 0 var(--ss-navy),
    -1px -1px 0 var(--ss-navy),
    1px -1px 0 var(--ss-navy),
    -1px 1px 0 var(--ss-navy),
    0 8px 0 rgba(12,40,70,.4);
  text-transform: uppercase; letter-spacing: 0.04em;
  animation: splashPop 0.5s var(--ease-pop);
}
@keyframes splashPop { 0%{transform:scale(0);opacity:0} 100%{transform:scale(1);opacity:1} }

/* Results Screen */
#screen-results { background: rgba(0,0,0,0.5); }
.results-card {
  background: linear-gradient(180deg, #F0F7FC 0%, #D5EAFA 100%);
  border: 3px solid var(--ss-navy);
  border-radius: var(--r-xl);
  box-shadow: 0 8px 0 rgba(12,40,70,.25), 0 12px 24px rgba(12,40,70,.2);
  padding: 32px 24px 24px;
  text-align: center; max-width: 380px; width: 90%;
  position: relative;
}
.results-title {
  position: absolute; top: -18px; left: 50%; transform: translateX(-50%);
  display: inline-flex; align-items: center; justify-content: center;
  padding: 8px 28px;
  background: var(--ss-orange-500);
  border: 3px solid var(--ss-navy);
  border-radius: 12px;
  box-shadow: 0 4px 0 rgba(12,40,70,.25);
  font-family: var(--font-flavor); font-size: 22px; font-weight: 800;
  color: #FFFFFF;
  -webkit-text-stroke: 1px var(--ss-navy);
  text-shadow: 1px 1px 0 var(--ss-navy);
  text-transform: uppercase; letter-spacing: 0.04em;
  white-space: nowrap;
  margin-bottom: 0;
}
.results-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 10px 4px; border-bottom: 2px solid rgba(12,40,70,0.1);
}
.results-label {
  font-family: var(--font-ui); font-size: 15px; font-weight: 700;
  color: var(--ss-ink-500);
  text-transform: uppercase; letter-spacing: 0.02em;
}
.results-value {
  font-family: var(--font-numeric); font-size: 22px; font-weight: 800;
  color: var(--ss-navy);
}
.results-coins {
  font-family: var(--font-flavor); font-size: 30px; font-weight: 900;
  color: var(--ss-orange-500);
  -webkit-text-stroke: 1px var(--ss-navy);
  text-shadow: 1px 1px 0 var(--ss-navy);
  margin: 18px 0;
  text-transform: uppercase; letter-spacing: 0.03em;
}
.results-buttons { display: flex; gap: 12px; margin-top: 16px; justify-content: center; }
.results-best {
  font-family: var(--font-numeric); font-size: 13px; font-weight: 800;
  color: var(--ss-ink-500);
  margin-top: 10px;
  letter-spacing: 0.04em;
}
.new-record {
  font-family: var(--font-flavor); font-size: 20px; font-weight: 900;
  color: var(--ss-orange-500);
  -webkit-text-stroke: 0.5px var(--ss-navy);
  text-shadow: 1px 1px 0 var(--ss-navy);
  text-transform: uppercase;
  animation: recordPulse 0.8s ease-in-out infinite;
}
@keyframes recordPulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.7;transform:scale(1.1)} }

/* Upgrade Cards (bottom of aim screen, Flight Master style) */
.aim-coins {
  position: absolute; top: 14px; left: 16px;
  display: inline-flex; align-items: center;
  height: 40px; padding: 0 16px 0 12px;
  background: #fff; border: 3px solid var(--ss-navy);
  border-radius: 999px;
  box-shadow: 0 3px 0 0 rgba(12,40,70,.2);
  font-family: var(--font-numeric); font-weight: 800; font-size: 18px;
  color: var(--ss-navy);
}
.aim-best {
  position: absolute; top: 14px; right: 16px;
  font-family: var(--font-numeric); font-size: 14px; font-weight: 800;
  color: #FFFFFF;
  -webkit-text-stroke: 0.5px var(--ss-navy);
  text-shadow: 1px 1px 0 var(--ss-navy);
  letter-spacing: 0.04em;
}
.aim-tap-text {
  font-family: var(--font-flavor); font-size: 40px; font-weight: 900;
  color: #FFFFFF;
  -webkit-text-stroke: 1.5px var(--ss-navy);
  text-shadow: 2px 2px 0 var(--ss-navy), 0 5px 0 rgba(12,40,70,.4);
  text-transform: uppercase; letter-spacing: 0.04em;
  position: absolute; top: 38%; left: 50%; transform: translateX(-50%);
  animation: aimBounce 1s ease-in-out infinite;
}
.upgrade-cards {
  position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
  display: flex; gap: 10px;
  pointer-events: auto;
}
.upg-card {
  width: 118px;
  background: #fff;
  border: 3px solid var(--ss-navy);
  border-radius: var(--r-xl);
  box-shadow: 0 6px 0 0 rgba(12,40,70,.2);
  padding: 10px 10px 0;
  text-align: center;
  overflow: hidden;
  cursor: pointer; user-select: none;
  transition: transform 0.1s;
  position: relative;
}
.upg-card:active { transform: translateY(3px); box-shadow: 0 3px 0 0 rgba(12,40,70,.2); }
.upg-card-title {
  font-family: var(--font-display); font-size: 13px; font-weight: 800;
  color: var(--ss-navy);
  text-transform: uppercase; letter-spacing: 0.04em;
  margin-bottom: 4px;
}
.upg-card-icon {
  background: var(--ss-blue-50);
  border-radius: 14px;
  border: 2px solid rgba(12,40,70,.15);
  height: 56px;
  display: grid; place-items: center;
  font-size: 32px;
  margin-bottom: 6px;
}
.upg-card-level {
  font-family: var(--font-numeric); font-size: 11px; font-weight: 800;
  color: var(--ss-ink-500); margin-bottom: 5px;
}
.upg-card-dots {
  display: flex; gap: 3px; justify-content: center; margin: 0 2px 8px;
}
.upg-card-dot {
  flex: 1; max-width: 9px; height: 9px; border-radius: 3px;
  background: var(--ss-ink-100);
  border: 1.5px solid rgba(12,40,70,.25);
}
.upg-card-dot.filled {
  background: var(--ss-yellow-500);
  border-color: var(--ss-yellow-700);
}
.upg-card-btn {
  margin: 0 -13px 0;
  height: 40px;
  display: flex; align-items: center; justify-content: center; gap: 5px;
  font-family: var(--font-display); font-size: 13px; font-weight: 800;
  color: #fff;
  background: var(--ss-green-500);
  border-top: 3px solid var(--ss-navy);
  border-left: 0; border-right: 0; border-bottom: 0;
  text-transform: uppercase; letter-spacing: 0.04em;
  -webkit-text-stroke: 0.5px var(--ss-navy);
  text-shadow: 1px 1px 0 var(--ss-navy);
  cursor: pointer;
  transition: background 0.1s;
}
.upg-card-btn:hover { background: var(--ss-green-300); }
.upg-card-btn.disabled {
  background: var(--ss-ink-100);
  color: var(--ss-ink-500);
  -webkit-text-stroke: 0;
  text-shadow: none;
  cursor: default;
}
.upg-card-btn.maxed {
  background: var(--ss-yellow-500);
  color: var(--ss-navy);
  -webkit-text-stroke: 0;
  text-shadow: none;
}

/* Garage Screen */
#screen-garage { justify-content: space-between; padding: 16px; }
.garage-top {
  width: 100%; display: flex; justify-content: space-between; align-items: flex-start;
}
.garage-coins {
  display: inline-flex; align-items: center;
  height: 40px; padding: 0 16px 0 12px;
  background: #fff; border: 3px solid var(--ss-navy);
  border-radius: 999px;
  box-shadow: 0 3px 0 0 rgba(12,40,70,.2);
  font-family: var(--font-numeric); font-weight: 800; font-size: 18px;
  color: var(--ss-navy);
}
.garage-title {
  display: inline-flex; align-items: center; justify-content: center;
  padding: 8px 22px;
  background: var(--ss-blue-500);
  border: 3px solid var(--ss-navy);
  border-radius: 12px;
  box-shadow: 0 4px 0 rgba(12,40,70,.2);
  font-family: var(--font-flavor); font-size: 18px; font-weight: 800;
  color: #FFFFFF;
  -webkit-text-stroke: 1px var(--ss-navy);
  text-shadow: 1px 1px 0 var(--ss-navy);
  text-transform: uppercase; letter-spacing: 0.04em;
}
.garage-middle {
  display: flex; align-items: center; justify-content: space-between;
  width: 100%; max-width: 500px; padding: 0 8px;
  position: absolute; top: 18%; left: 50%; transform: translateX(-50%);
}
.garage-arrow {
  width: 56px; height: 56px; border-radius: 50%;
  background: #fff; border: 3px solid var(--ss-navy);
  color: var(--ss-navy); font-size: 22px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  user-select: none; transition: transform 0.1s, box-shadow 0.1s;
  pointer-events: auto; flex-shrink: 0;
  box-shadow: 0 4px 0 0 rgba(12,40,70,.2);
  font-weight: 900;
}
.garage-arrow:active {
  transform: translateY(3px);
  box-shadow: 0 1px 0 0 rgba(12,40,70,.2);
}
.garage-name-plate {
  background: var(--ss-blue-500);
  border: 3px solid var(--ss-navy);
  border-radius: 14px; padding: 10px 32px;
  box-shadow: 0 4px 0 rgba(12,40,70,.25);
  font-family: var(--font-flavor); font-size: 28px; font-weight: 800;
  color: #FFFFFF;
  -webkit-text-stroke: 1px var(--ss-navy);
  text-shadow: 1px 1px 0 var(--ss-navy);
  text-transform: uppercase;
  min-width: 160px; text-align: center;
  letter-spacing: 0.03em;
}
.garage-bottom {
  display: flex; flex-direction: column; align-items: center; gap: 12px;
  pointer-events: auto;
}
.garage-dots {
  display: flex; gap: 8px;
}
.garage-dot {
  width: 10px; height: 10px; border-radius: 50%;
  background: rgba(255,255,255,0.25); transition: background 0.2s;
}
.garage-dot.active { background: var(--ss-yellow-500); border-color: var(--ss-yellow-700); }
.garage-dot { border: 1.5px solid rgba(12,40,70,.25); background: var(--ss-ink-100); }
/* Skin row (nested under craft selector) */
.skin-row {
  display: flex; flex-direction: column; align-items: center; gap: 8px;
  background: rgba(255,255,255,0.92);
  border: 3px solid var(--ss-navy);
  border-radius: 16px;
  padding: 12px 24px;
  box-shadow: 0 4px 0 rgba(12,40,70,.2);
  margin-top: 4px;
  pointer-events: auto;
}
.skin-label {
  font-family: var(--font-display); font-size: 12px; font-weight: 800;
  color: var(--ss-ink-500);
  text-transform: uppercase;
  letter-spacing: 0.15em;
}
.skin-selector {
  display: flex; align-items: center; gap: 12px;
}
.skin-name {
  font-family: var(--font-flavor); font-size: 20px; font-weight: 800;
  color: var(--ss-navy);
  min-width: 120px; text-align: center;
  text-transform: uppercase; letter-spacing: 0.02em;
}
.skin-arrow {
  width: 34px; height: 34px; border-radius: 50%;
  background: var(--ss-blue-500); border: 2.5px solid var(--ss-navy);
  color: #fff; font-size: 14px; font-weight: 900; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  user-select: none;
  transition: transform 0.1s, box-shadow 0.1s;
  box-shadow: 0 3px 0 0 var(--ss-blue-700);
}
.skin-arrow:active {
  transform: translateY(2px);
  box-shadow: 0 1px 0 0 var(--ss-blue-700);
}

@media (max-width: 400px) {
  .upg-card { width: 100px; padding: 8px 6px 6px; }
  .upg-card-icon { font-size: 26px; }
  .upg-card-btn { font-size: 11px; }
  .garage-name-plate { font-size: 20px; padding: 6px 18px; }
}

/* Floating text */
.float-text {
  position: absolute; pointer-events: none;
  font-family: var(--font-flavor); font-size: 28px; font-weight: 900;
  color: var(--ss-yellow-500);
  -webkit-text-stroke: 1.5px var(--ss-navy);
  text-shadow: 2px 2px 0 var(--ss-navy), 0 4px 0 rgba(12,40,70,.4);
  text-transform: uppercase;
  animation: floatUp 1.2s ease-out forwards;
  z-index: 20;
}
@keyframes floatUp {
  0% { opacity: 1; transform: translateY(0) scale(1); }
  100% { opacity: 0; transform: translateY(-60px) scale(1.3); }
}

@media (max-width: 480px) {
  .title-text { font-size: 48px; }
  .game-btn { font-size: 20px; padding: 12px 28px; }
  .hud-distance { font-size: 28px; }
  .results-card { padding: 24px 28px; }
  .upgrade-card { padding: 20px 24px; }
  .splash-text { font-size: 56px; }
}
</style>
</head>
<body>

<canvas id="game-canvas"></canvas>

<!-- Title Screen -->
<div id="screen-title" class="screen active">
  <div class="title-text">FLUGTAG</div>
  <div class="title-sub">Build. Launch. Fly!</div>
  <button class="game-btn pulse" id="btn-play">TAP TO FLY</button>
  <div class="best-distance" id="title-best"></div>
</div>

<!-- Garage Screen (craft + skin selection) -->

  <div class="garage-top">
    <div class="garage-coins" id="garage-coins">0</div>
    <div class="garage-title">Workshop</div>
    <div style="width:60px"></div>
  </div>
  <!-- Craft selector (primary) -->
  <div class="garage-middle">
    <div class="garage-arrow" id="craft-prev">&#9664;</div>
    <div class="garage-name-plate" id="craft-name">BATHTUB</div>
    <div class="garage-arrow" id="craft-next">&#9654;</div>

  <div class="garage-bottom">
    <!-- Craft dots -->

    <!-- Skin selector (nested under craft) -->

      <div class="skin-label">SKIN</div>
      <div class="skin-selector">
        <div class="skin-arrow" id="skin-prev">&#9664;</div>
        <div class="skin-name" id="skin-name">Classic</div>
        <div class="skin-arrow" id="skin-next">&#9654;</div>
      </div>
      <div class="garage-dots" id="skin-dots"></div>
    </div>
    <button class="game-btn green pulse" id="btn-garage-fly" style="font-size:28px;padding:16px 52px;">FLY!</button>
  </div>
</div>

<!-- Aim HUD (with upgrade cards) -->
<div id="screen-aim-hud" class="screen passthrough">
  <div class="aim-coins" id="aim-coins">0</div>
  <div class="aim-best" id="aim-best"></div>
  <div class="aim-tap-text" id="aim-text">TAP TO FLY</div>
  <div class="power-display" id="power-text"></div>
  <div class="upgrade-cards" id="upgrade-cards"></div>
</div>

<!-- Flight HUD -->
<div id="screen-flight-hud" class="screen passthrough">
  <div class="hud-top">
    <div>
      <div class="hud-altitude" id="hud-alt">ALT: 0m</div>
      <div class="hud-speed" id="hud-speed">SPD: 0</div>
      <div class="hud-boost-bar"><div class="hud-boost-fill" id="hud-boost"></div></div>

    <div class="hud-coins" id="hud-coins">0</div>

</div>

<!-- Splash Screen -->
<div id="screen-splash" class="screen passthrough">

</div>

<!-- Results Screen -->
<div id="screen-results" class="screen">
  <div class="results-card">
    <div class="results-title">FLIGHT COMPLETE</div>
    <div class="results-row"><span class="results-label">Distance</span><span class="results-value" id="res-dist">0m</span></div>
    <div class="results-row"><span class="results-label">Max Height</span><span class="results-value" id="res-alt">0m</span></div>
    <div class="results-row"><span class="results-label">Top Speed</span><span class="results-value" id="res-speed">0</span></div>
    <div class="results-coins" id="res-coins">+0 COINS</div>
    <div class="results-best" id="res-best"></div>
    <div class="results-buttons">
      <button class="game-btn secondary" id="btn-garage">GARAGE</button>
      <button class="game-btn green pulse" id="btn-fly-again">FLY AGAIN</button>

  </div>
</div>


<!-- Floating text layer -->
<div id="float-layer" style="position:absolute;inset:0;pointer-events:none;z-index:20;overflow:hidden;"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/meshoptimizer@0.20.0/meshopt_decoder.js"></script>
<script>
// ===== CONSTANTS & CONFIG =====
const DEG2RAD = Math.PI / 180;
const RAMP_HEIGHT = 12;
const RAMP_LENGTH = 8;
const RAMP_ANGLE = 15 * DEG2RAD;
const GRAVITY = 9.8;
const AIR_DENSITY = 1.2;
const MAX_PULL_PX = 180;
const MAX_PITCH = 40 * DEG2RAD;
const PITCH_SPEED = 1.8;
const AUTO_STABILIZE = 0.4;
const MAX_UPGRADE_LEVEL = 10;
const BUOY_COUNT = 30;
const BUOY_SPACING = 50;

const UPGRADES = {
  slingshot: { name: 'Slingshot', baseCost: 50,  perLevel: 55,  icon: '\u{1F3F9}' },
  plane:     { name: 'Plane',     baseCost: 75,  perLevel: 80,  icon: '\u{2708}\u{FE0F}' },
  income:    { name: 'Income',    baseCost: 120, perLevel: 130, icon: '\u{1F4B0}' },
};

// ===== CRAFT CATALOG =====
// Each craft has skins — each skin is a complete GLB
const CRAFTS = [
  { id: 'bathtub', name: 'Bathtub', skins: [
    { name: 'Classic',   file: 'Meshy_AI_Gilded_Bath_0330161619_texture.glb',       rotY: Math.PI * 1.5 },
    { name: 'Cardboard', file: 'Meshy_AI_Bathtub_Cardboard_0402170410_texture.glb', rotY: Math.PI * 0.5 },
  ]},
  { id: 'rocket', name: 'Rocket', skins: [
    { name: 'Classic', file: 'Meshy_AI_Red_Stripe_Rocket_0330160432_texture.glb', rotY: Math.PI * 0.5 },
    { name: 'Delta',   file: 'Meshy_AI_Rocket_delta_0402170813_texture.glb',      rotY: Math.PI * 0.5 },
  ]},
  { id: 'banana', name: 'Banana', skins: [
    { name: 'Classic', file: 'Meshy_AI_banana_3d_0329211148_texture.glb',       rotY: Math.PI * 0.5 },
    { name: 'Biplane', file: 'Meshy_AI_Banana_Bip_0402164037_texture.glb',      rotY: Math.PI * 0.5 },
  ]},
  { id: 'couch', name: 'Couch', skins: [
    { name: 'Classic', file: 'Meshy_AI_couch_car_0330162428_texture.glb',       rotY: 0 },
    { name: 'Winged',  file: 'Meshy_AI_Couch_Standard_0402165535_texture.glb',  rotY: 0 },
  ]},
  { id: 'shoe', name: 'Shoe', skins: [
    { name: 'Classic', file: 'Meshy_AI_shoe_car_0330163356_texture.glb',       rotY: Math.PI * 0.5 },
    { name: 'Biplane', file: 'Meshy_AI_Shoe_Bip_0402164732_texture.glb',      rotY: Math.PI * 0.5 },
  ]},
];
let currentCraftIdx = 0;
let currentSkinIdx = 0;
const glbCache = {};

function loadGLB(url) {
  if (glbCache[url]) return Promise.resolve(glbCache[url].clone());
  return new Promise((resolve, reject) => {
    const loader = new THREE.GLTFLoader();
    loader.setMeshoptDecoder(MeshoptDecoder);
    loader.load(url, (gltf) => {
      glbCache[url] = gltf.scene;
      resolve(gltf.scene.clone());
    }, undefined, (err) => {
      console.warn('GLB load failed:', url, err);
      reject(err);
    });
  });
}

function toonifyModel(model) {
  model.traverse((child) => {
    if (child.isMesh && child.material) {
      const origColor = child.material.color ? child.material.color.clone() : new THREE.Color(0xcccccc);
      const origMap = child.material.map || null;
      const mat = new THREE.MeshToonMaterial({ color: origColor, gradientMap: gradientMap5 });
      if (origMap) mat.map = origMap;
      child.material = mat;
      child.castShadow = true;
      child.receiveShadow = true;
    }
  });
}

// ===== SAVE / LOAD =====
const SAVE_KEY = 'flugtag:save';
const defaultSave = {
  coins: 0, totalDistance: 0, bestDistance: 0, totalFlights: 0,
  upgrades: { slingshot: 0, plane: 0, income: 0 },
  craftIdx: 0, skinIdx: 0,
};
let save;
function loadSave() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    save = raw ? { ...defaultSave, ...JSON.parse(raw), upgrades: { ...defaultSave.upgrades, ...(JSON.parse(raw).upgrades || {}) } } : { ...defaultSave };
  } catch { save = { ...defaultSave }; }
}
function writeSave() {
  try { localStorage.setItem(SAVE_KEY, JSON.stringify(save)); } catch {}
}
function getUpgradeCost(key) {
  const u = UPGRADES[key];
  return u.baseCost + save.upgrades[key] * u.perLevel;
}

// Derived stats from upgrades
// Slingshot upgrade: launch speed
function getMaxLaunchSpeed() { return 28 + save.upgrades.slingshot * 3.5; }
// Plane upgrade: lift, wing area, engine thrust, fuel (all bundled)
function getLiftCoeff()      { return 0.45 + save.upgrades.plane * 0.07; }
function getWingArea()       { return 3.0 + save.upgrades.plane * 0.4; }
function getEngineThrust()   { return 0.3 + save.upgrades.plane * 0.6; }
function getMaxFuel()        { return 1.0 + save.upgrades.plane * 2.0; }
function getDragCoeff()      { return Math.max(0.03, 0.06 - save.upgrades.plane * 0.003); }
// Income upgrade: coin multiplier
function getIncomeMulti()    { return 1.0 + save.upgrades.income * 0.3; }

// ===== THREE.JS SCENE SETUP =====
const canvas = document.getElementById('game-canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
renderer.setClearColor(0x000000, 0); // fully transparent clear
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.outputEncoding = THREE.sRGBEncoding;

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 2000);

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ===== TOON MATERIAL HELPERS =====
const gradientMap3 = createGradientMap(3);
const gradientMap5 = createGradientMap(5);

function createGradientMap(steps) {
  let colors;
  if (steps === 3) colors = new Uint8Array([102, 178, 255]);
  else if (steps === 5) colors = new Uint8Array([77, 128, 178, 217, 255]);
  else {
    colors = new Uint8Array(steps);
    for (let i = 0; i < steps; i++) colors[i] = Math.round(((i + 1) / steps) * 255);
  }
  const t = new THREE.DataTexture(colors, colors.length, 1, THREE.LuminanceFormat);
  t.minFilter = THREE.NearestFilter;
  t.magFilter = THREE.NearestFilter;
  t.needsUpdate = true;
  return t;
}

function toonMat(color, hero = false) {
  return new THREE.MeshToonMaterial({ color, gradientMap: hero ? gradientMap5 : gradientMap3 });
}

function addOutline(mesh, thickness = 0.03) {
  const geo = mesh.geometry.clone();
  const mat = new THREE.MeshBasicMaterial({ color: 0x222222, side: THREE.BackSide });
  const outline = new THREE.Mesh(geo, mat);
  outline.scale.multiplyScalar(1 + thickness);
  mesh.add(outline);
  return outline;
}

// ===== LIGHTING =====
const ambientLight = new THREE.AmbientLight(0xffffff, 0.35);
scene.add(ambientLight);

const sunLight = new THREE.DirectionalLight(0xfff4e0, 1.0);
sunLight.position.set(40, 80, 30);
sunLight.castShadow = true;
sunLight.shadow.mapSize.set(1024, 1024);
sunLight.shadow.camera.near = 1;
sunLight.shadow.camera.far = 200;
sunLight.shadow.camera.left = -60;
sunLight.shadow.camera.right = 60;
sunLight.shadow.camera.top = 60;
sunLight.shadow.camera.bottom = -20;
scene.add(sunLight);

const hemiLight = new THREE.HemisphereLight(0x87CEEB, 0x3D7A2D, 0.5);
scene.add(hemiLight);

// ===== SKY (transparent — CSS background shows through) =====
scene.background = null;

// ===== RIVER / LAKE WATER =====
const RIVER_WIDTH = 50;
const waterGeo = new THREE.PlaneGeometry(RIVER_WIDTH, 4000, 32, 64);
waterGeo.rotateX(-Math.PI / 2);
const waterMat = toonMat(0x3399AA); // Fresh water — greener than ocean
waterMat.emissive = new THREE.Color(0x114433);
waterMat.emissiveIntensity = 0.15;
const water = new THREE.Mesh(waterGeo, waterMat);
water.receiveShadow = true;
water.position.y = -0.1;
scene.add(water);

// Water wave animation
function updateWater(time) {
  const pos = waterGeo.attributes.position;
  for (let i = 0; i < pos.count; i++) {
    const x = pos.getX(i);
    const z = pos.getZ(i);
    pos.setY(i, Math.sin(x * 0.08 + time * 0.8) * 0.15 + Math.sin(z * 0.04 + time * 0.6) * 0.12);
  }
  pos.needsUpdate = true;
}

// ===== RIVERBANKS (grassy ground on both sides) =====
const bankMat = toonMat(0x5CAD3B);
const bankDirtMat = toonMat(0x8B6D3F);

function createBank(side) { // side: -1 (left) or +1 (right)
  const bankGroup = new THREE.Group();
  // Main grass surface — very wide to fill the screen even at high altitude
  const grassGeo = new THREE.PlaneGeometry(1000, 4000);
  grassGeo.rotateX(-Math.PI / 2);
  const grass = new THREE.Mesh(grassGeo, bankMat);
  grass.receiveShadow = true;
  grass.position.set(side * (RIVER_WIDTH / 2 + 500), 0.05, 0);
  bankGroup.add(grass);

  // Dirt edge along the water
  const edgeGeo = new THREE.BoxGeometry(3, 1.2, 4000);
  const edge = new THREE.Mesh(edgeGeo, bankDirtMat);
  edge.position.set(side * (RIVER_WIDTH / 2 + 1.5), 0.5, 0);
  edge.castShadow = true;
  bankGroup.add(edge);

  // Grass tuft on top of dirt edge
  const turfGeo = new THREE.BoxGeometry(3.5, 0.15, 4000);
  const turf = new THREE.Mesh(turfGeo, bankMat);
  turf.position.set(side * (RIVER_WIDTH / 2 + 1.5), 1.1, 0);
  bankGroup.add(turf);

  scene.add(bankGroup);
  return bankGroup;
}
createBank(-1);
createBank(1);

// ===== HORIZON HILLS (blend 3D ground into background) =====
(function createHorizonHills() {
  const hillMat = toonMat(0x4A9E35); // slightly darker green
  const hillMatLight = toonMat(0x5CAD3B);

  // Row of rolling hills across the horizon
  const hillData = [
    // [x, z, width, height, depth]
    [-120, 1400, 180, 25, 60],
    [-30,  1450, 200, 35, 70],
    [80,   1400, 160, 28, 55],
    [180,  1430, 190, 30, 65],
    [-200, 1420, 170, 22, 50],
    [0,    1500, 250, 40, 80],
    [-150, 1480, 200, 32, 60],
    [120,  1490, 220, 36, 70],
  ];

  hillData.forEach(([x, z, w, h, d]) => {
    const geo = new THREE.SphereGeometry(1, 8, 6);
    geo.scale(w / 2, h, d / 2);
    const mat = Math.random() > 0.5 ? hillMat : hillMatLight;
    const hill = new THREE.Mesh(geo, mat);
    hill.position.set(x, 0, z);
    scene.add(hill);
  });

  // Flat horizon cap — wide green strip at the far end
  const capGeo = new THREE.PlaneGeometry(3000, 600);
  capGeo.rotateX(-Math.PI / 2);
  const cap = new THREE.Mesh(capGeo, hillMatLight);
  cap.position.set(0, 0.1, 1600);
  scene.add(cap);
})();

// ===== TREES ALONG RIVERBANKS =====
function createTree(x, z) {
  const group = new THREE.Group();
  // Trunk
  const trunk = new THREE.Mesh(
    new THREE.CylinderGeometry(0.25, 0.35, 2.5, 6),
    toonMat(0x8B6D3F)
  );
  trunk.position.y = 1.25;
  trunk.castShadow = true;
  group.add(trunk);
  // Foliage (2-3 stacked spheres)
  const leafMat = toonMat(0x3D8B37);
  const sizes = [1.8, 1.4, 0.9];
  sizes.forEach((s, i) => {
    const leaf = new THREE.Mesh(new THREE.SphereGeometry(s, 7, 6), leafMat);
    leaf.position.y = 3.0 + i * 1.1;
    leaf.scale.y = 0.75;
    leaf.castShadow = true;
    group.add(leaf);
  });
  addOutline(trunk, 0.015);
  group.position.set(x, 0, z);
  group.scale.setScalar(0.8 + Math.random() * 0.6);
  scene.add(group);
  return group;
}

// Plant trees along both banks
for (let z = -20; z < 1500; z += 8 + Math.random() * 12) {
  const offsetL = RIVER_WIDTH / 2 + 6 + Math.random() * 25;
  const offsetR = RIVER_WIDTH / 2 + 6 + Math.random() * 25;
  createTree(-offsetL + (Math.random() - 0.5) * 4, z);
  createTree(offsetR + (Math.random() - 0.5) * 4, z);
}

// ===== DENSE FOREST (further from river) =====
for (let z = -20; z < 1500; z += 5 + Math.random() * 8) {
  for (let row = 0; row < 3; row++) {
    const depth = 40 + row * 20 + Math.random() * 15;
    const side = Math.random() > 0.5 ? 1 : -1;
    const x = side * (RIVER_WIDTH / 2 + depth);
    createTree(x + (Math.random() - 0.5) * 8, z + (Math.random() - 0.5) * 4);
  }
}

// ===== AUSTRIAN COUNTRYSIDE HOUSES =====
function createHouse(x, z, style) {
  const group = new THREE.Group();

  // Wall colors — Austrian countryside palette
  const wallColors = [0xFFF8E0, 0xFFE4B5, 0xF5DEB3, 0xFAF0E6, 0xFFDAB9, 0xE8D8C0];
  const roofColors = [0xCC4433, 0xBB5533, 0x994422, 0xAA3322, 0xDD6644];
  const wallColor = wallColors[Math.floor(Math.random() * wallColors.length)];
  const roofColor = roofColors[Math.floor(Math.random() * roofColors.length)];

  const w = 2 + Math.random() * 1.5;
  const h = 2 + Math.random() * 1.5;
  const d = 2.5 + Math.random() * 1.5;

  // Walls
  const walls = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), toonMat(wallColor));
  walls.position.y = h / 2;
  walls.castShadow = true;
  addOutline(walls, 0.02);
  group.add(walls);

  // Pitched roof
  const roofGeo = new THREE.ConeGeometry(Math.max(w, d) * 0.65, h * 0.6, 4);
  const roof = new THREE.Mesh(roofGeo, toonMat(roofColor));
  roof.position.y = h + h * 0.25;
  roof.rotation.y = Math.PI / 4;
  roof.castShadow = true;
  addOutline(roof, 0.02);
  group.add(roof);

  // Windows (small dark squares on front)
  const winMat = toonMat(0x446688);
  for (let wx = -0.4; wx <= 0.4; wx += 0.8) {
    const win = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.35, 0.05), winMat);
    win.position.set(wx, h * 0.55, d / 2 + 0.03);
    group.add(win);
  }

  // Door
  const door = new THREE.Mesh(new THREE.BoxGeometry(0.35, 0.6, 0.05), toonMat(0x6B4226));
  door.position.set(0, 0.3, d / 2 + 0.03);
  group.add(door);

  // Optional: chimney
  if (Math.random() > 0.4) {
    const chimney = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.8, 0.3), toonMat(0x886655));
    chimney.position.set(w * 0.25, h + h * 0.35, 0);
    group.add(chimney);
  }

  group.position.set(x, 0, z);
  group.rotation.y = Math.random() * Math.PI * 2;
  scene.add(group);
  return group;
}

// Small church/chapel
function createChapel(x, z) {
  const group = new THREE.Group();

  // Main building
  const walls = new THREE.Mesh(new THREE.BoxGeometry(3, 3.5, 4), toonMat(0xFFF8E8));
  walls.position.y = 1.75; walls.castShadow = true;
  addOutline(walls, 0.02);
  group.add(walls);

  // Steep roof
  const roof = new THREE.Mesh(new THREE.ConeGeometry(2.8, 2, 4), toonMat(0x556655));
  roof.position.y = 4.5; roof.rotation.y = Math.PI / 4;
  addOutline(roof, 0.02);
  group.add(roof);

  // Steeple/tower
  const tower = new THREE.Mesh(new THREE.BoxGeometry(1, 5, 1), toonMat(0xFFF8E8));
  tower.position.set(0, 2.5, -2.2); tower.castShadow = true;
  addOutline(tower, 0.02);
  group.add(tower);

  // Steeple top (onion dome — Austrian style)
  const dome = new THREE.Mesh(new THREE.SphereGeometry(0.6, 8, 8), toonMat(0x448866));
  dome.position.set(0, 5.3, -2.2); dome.scale.y = 1.4;
  group.add(dome);

  // Cross on top
  const cross = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.5, 0.08), toonMat(0xCCAA44));
  cross.position.set(0, 6.3, -2.2);
  group.add(cross);
  const crossH = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.08, 0.08), toonMat(0xCCAA44));
  crossH.position.set(0, 6.15, -2.2);
  group.add(crossH);

  group.position.set(x, 0, z);
  group.rotation.y = Math.random() * Math.PI * 2;
  scene.add(group);
  return group;
}

// Scatter houses along both banks (further back from river)
for (let z = 30; z < 1400; z += 30 + Math.random() * 50) {
  for (const side of [-1, 1]) {
    const dist = RIVER_WIDTH / 2 + 50 + Math.random() * 80;
    createHouse(side * dist, z);
    // Sometimes add a second house nearby (small cluster)
    if (Math.random() > 0.5) {
      createHouse(side * (dist + 5 + Math.random() * 8), z + (Math.random() - 0.5) * 10);
    }
  }
}

// A few chapels scattered along the route
const chapelPositions = [
  [-90, 150], [100, 400], [-110, 700], [95, 1000], [-85, 1300]
];
chapelPositions.forEach(([x, z]) => createChapel(x, z));

// ===== CROWD ON THE BANKS =====
function createCrowdFigure(x, y, z) {
  const group = new THREE.Group();
  const shirtColors = [0xFF6644, 0x44AAFF, 0xFFDD22, 0x66DD66, 0xFF44AA, 0xAA44FF];
  const shirtColor = shirtColors[Math.floor(Math.random() * shirtColors.length)];
  // Body
  const body = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.5, 0.2), toonMat(shirtColor));
  body.position.y = 0.5;
  group.add(body);
  // Head
  const head = new THREE.Mesh(new THREE.SphereGeometry(0.15, 6, 6), toonMat(0xFFCC88));
  head.position.y = 0.9;
  group.add(head);
  group.position.set(x, y, z);
  scene.add(group);
  return group;
}

// Crowd clusters near the ramp on both banks
for (let z = -10; z < 40; z += 1.2 + Math.random() * 0.8) {
  for (let row = 0; row < 3; row++) {
    const xOffL = -(RIVER_WIDTH / 2 + 2 + row * 1.2) + (Math.random() - 0.5) * 0.5;
    const xOffR = (RIVER_WIDTH / 2 + 2 + row * 1.2) + (Math.random() - 0.5) * 0.5;
    createCrowdFigure(xOffL, 1.0, z);
    createCrowdFigure(xOffR, 1.0, z);
  }
}
// Sparse crowd further downstream

// Placeholder (shown while GLB loads)

let currentGLBModel = null;
let isLoadingCraft = false;

function buildCraft() {
  const craft = CRAFTS[currentCraftIdx];
  if (currentSkinIdx >= craft.skins.length) currentSkinIdx = 0;
  const skin = craft.skins[currentSkinIdx];

  if (currentGLBModel) { craftGroup.remove(currentGLBModel); currentGLBModel = null; }
  placeholderFuselage.visible = true;
  isLoadingCraft = true;

  loadGLB(skin.file).then((model) => {
    toonifyModel(model);
    scene.add(model);

    // Apply per-skin rotation
    model.rotation.y = skin.rotY || 0;

    let box = new THREE.Box3().setFromObject(model);
    let size = box.getSize(new THREE.Vector3());

    // Scale by the longest horizontal axis (these crafts have wings wider than long)
    const longest = Math.max(size.x, size.z);
    const s = CRAFT_TARGET_LENGTH / Math.max(longest, 0.01);
    model.scale.multiplyScalar(s);

    box.setFromObject(model);
    const center = box.getCenter(new THREE.Vector3());
    model.position.x -= center.x;
    model.position.z -= center.z;
    model.position.y -= box.min.y;

    scene.remove(model);
    placeholderFuselage.visible = false;
    currentGLBModel = model;
    craftGroup.add(model);
    isLoadingCraft = false;
    console.log('Craft loaded:', craft.name, skin.name);
  }).catch((err) => {
    console.error('GLB load failed:', skin.file, err);
    placeholderFuselage.visible = true;
    isLoadingCraft = false;
  });
}

function updateBands(craftPos, show) {
  bandL.visible = show;
  bandR.visible = show;
  if (!show) return;
  const lPost = new THREE.Vector3(-1.5, RAMP_HEIGHT + 3, 1);
  const rPost = new THREE.Vector3(1.5, RAMP_HEIGHT + 3, 1);
  [bandL, bandR].forEach((band, i) => {
    const post = i === 0 ? lPost : rPost;
    const mid = new THREE.Vector3().addVectors(post, craftPos).multiplyScalar(0.5);
    band.position.copy(mid);
    const dir = new THREE.Vector3().subVectors(craftPos, post);
    const len = dir.length();
    band.scale.y = len;
    band.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), dir.normalize());
  });
}

const previewDots = [];

function updateTrajectoryPreview(startPos, vel, show) {
  if (!show) { previewDots.forEach(d => d.visible = false); return; }
  let px = startPos.x, py = startPos.y, pz = startPos.z;
  let vx = vel.x, vy = vel.y, vz = vel.z;
  const dt = 0.1;
  for (let i = 0; i < previewDots.length; i++) {
    vy -= GRAVITY * dt;
    px += vx * dt; py += vy * dt; pz += vz * dt;
    previewDots[i].position.set(px, Math.max(py, 0), pz);
    previewDots[i].visible = py > 0;
  }
}

const splashParticles = [];
for (let i = 0; i < 25; i++) {
  const p = new THREE.Mesh(
    new THREE.SphereGeometry(0.12 + Math.random() * 0.1, 6, 6),
    toonMat(0x88DDEE)
  );
  p.visible = false;
  scene.add(p);
  splashParticles.push({ mesh: p, vel: new THREE.Vector3(), life: 0 });
}

function triggerSplashEffect(x, y, z, speed) {
  splashParticles.forEach(p => {
    p.mesh.visible = true;
    p.mesh.position.set(x, 0.5, z);
    const angle = Math.random() * Math.PI * 2;
    const upForce = 3 + Math.random() * speed * 0.3;
    const outForce = 1 + Math.random() * 2;
    p.vel.set(Math.cos(angle) * outForce, upForce, Math.sin(angle) * outForce);
    p.life = 1.5 + Math.random() * 0.5;
  });
}

function updateSplashParticles(dt) {
  splashParticles.forEach(p => {
    if (p.life <= 0) { p.mesh.visible = false; return; }
    p.vel.y -= GRAVITY * dt;
    p.mesh.position.add(p.vel.clone().multiplyScalar(dt));
    if (p.mesh.position.y < 0) p.mesh.position.y = 0;
    p.life -= dt;
    p.mesh.material.opacity = Math.min(p.life, 1);
    p.mesh.material.transparent = true;
  });
}

// ===== SCREEN MANAGEMENT =====
const screens = ['screen-title', 'screen-garage', 'screen-aim-hud', 'screen-flight-hud', 'screen-splash', 'screen-results'];
function showScreen(id) {
  screens.forEach(s => document.getElementById(s).classList.remove('active'));
  if (id) document.getElementById(id).classList.add('active');
}

function showFloatText(text, screenX, screenY) {
  const el = document.createElement('div');
  el.className = 'float-text';
  el.textContent = text;
  el.style.left = screenX + 'px';
  el.style.top = screenY + 'px';
  document.getElementById('float-layer').appendChild(el);
  setTimeout(() => el.remove(), 1200);

// ===== STATE TRANSITIONS =====
function setState(state) {
  gameState = state;
  switch (state) {
    case 'TITLE':
      showScreen('screen-title');
      craftGroup.position.copy(CRAFT_REST_POS);
      craftGroup.rotation.set(0, 0, 0);
      updateBands(craftGroup.position, false);
      updateTrajectoryPreview(null, null, false);
      camTarget.set(0, RAMP_HEIGHT + 5, -10);
      camLookTarget.set(0, RAMP_HEIGHT, 5);
      camLerp = 0.05;
      if (save.bestDistance > 0) {
        document.getElementById('title-best').textContent = 'BEST: ' + Math.floor(save.bestDistance) + 'm';
      }
      break;

    case 'GARAGE':
      showScreen('screen-garage');
      craftGroup.position.copy(CRAFT_REST_POS);
      craftGroup.rotation.set(0, 0, 0);
      updateBands(craftGroup.position, false);
      updateTrajectoryPreview(null, null, false);
      // Camera: framing the craft on the deck
      camTarget.set(4, RAMP_HEIGHT + 3, -8);
      camLookTarget.set(0, RAMP_HEIGHT + 0.5, -1);
      camLerp = 0.06;
      renderGarage();
      break;

    case 'READY':
      showScreen('screen-aim-hud');
      document.getElementById('aim-text').textContent = 'TAP TO FLY';
      document.getElementById('aim-text').style.display = '';
      document.getElementById('power-text').textContent = '';
      craftGroup.position.copy(CRAFT_REST_POS);
      craftGroup.rotation.set(0, 0, 0);
      updateBands(craftGroup.position, false);
      updateTrajectoryPreview(null, null, false);
      camTarget.set(0, RAMP_HEIGHT + 4, -8);
      camLookTarget.set(0, RAMP_HEIGHT + 1, 2);
      camLerp = 0.05;
      isDragging = false;
      aimPower = 0;
      aimAngle = 20 * DEG2RAD;
      document.getElementById('upgrade-cards').style.display = '';
      renderUpgradeCards();
      break;

    case 'AIMING':
      document.getElementById('aim-text').style.display = 'none';
      document.getElementById('upgrade-cards').style.display = 'none';
      break;

    case 'LAUNCH': {
      showScreen('screen-flight-hud');
      const maxSpd = getMaxLaunchSpeed();
      const launchSpeed = aimPower * maxSpd;
      vel.x = 0;
      vel.y = launchSpeed * Math.sin(aimAngle);
      vel.z = launchSpeed * Math.cos(aimAngle);
      pos.x = craftGroup.position.x;
      pos.y = craftGroup.position.y;
      pos.z = craftGroup.position.z;
      pitch = aimAngle * 0.7;
      pitchInput = 0;
      fuel = getMaxFuel();
      boostActive = false;
      flightDistance = 0;
      maxAltitude = pos.y;
      maxSpeed = launchSpeed;
      lastMilestone = 0;
      coinsEarned = 0;
      trailTimer = 0;
      boostTimer = 0;
      updateBands(craftGroup.position, false);
      updateTrajectoryPreview(null, null, false);
      camLerp = 0.12;
      setTimeout(() => { if (gameState === 'LAUNCH') setState('FLIGHT'); }, 300);
      break;
    }

    case 'FLIGHT':
      camLerp = 0.04;
      break;

    case 'SPLASH': {
      showScreen('screen-splash');
      const impactSpeed = Math.sqrt(vel.x * vel.x + vel.y * vel.y + vel.z * vel.z);
      triggerSplashEffect(pos.x, 0, pos.z, impactSpeed);
      vel.x = 0; vel.y = 0; vel.z = 0;
      pos.y = 0;
      craftGroup.position.set(pos.x, 0.3, pos.z);

      // Calculate coins
      flightDistance = Math.max(0, pos.z);
      coinsEarned = Math.floor((flightDistance / 5 + maxAltitude / 2) * getIncomeMulti());

      camLerp = 0.02;
      setTimeout(() => { if (gameState === 'SPLASH') setState('RESULTS'); }, 1800);
      break;
    }

    case 'RESULTS': {
      showScreen('screen-results');
      save.coins += coinsEarned;
      save.totalDistance += flightDistance;
      save.totalFlights++;
      const isNewRecord = flightDistance > save.bestDistance;
      if (isNewRecord) save.bestDistance = flightDistance;
      writeSave();

      document.getElementById('res-dist').textContent = Math.floor(flightDistance) + 'm';
      document.getElementById('res-alt').textContent = Math.floor(maxAltitude) + 'm';
      document.getElementById('res-speed').textContent = Math.floor(maxSpeed) + ' m/s';
      document.getElementById('res-coins').textContent = '+' + coinsEarned + ' COINS';
      document.getElementById('res-best').textContent = isNewRecord ? '' : 'BEST: ' + Math.floor(save.bestDistance) + 'm';
      if (isNewRecord) {
        document.getElementById('res-best').innerHTML = '<span class="new-record">NEW RECORD!</span>';
      }
      break;
    }

  }
}

// ===== UPGRADE CARDS RENDERING =====
function renderUpgradeCards() {
  document.getElementById('aim-coins').textContent = '\u{1FA99} ' + save.coins;
  const best = save.bestDistance;
  document.getElementById('aim-best').textContent = best > 0 ? ('BEST: ' + Math.floor(best) + 'm') : '';

  const container = document.getElementById('upgrade-cards');
  container.innerHTML = '';

  Object.entries(UPGRADES).forEach(([key, def]) => {
    const level = save.upgrades[key];
    const cost = getUpgradeCost(key);
    const isMax = level >= MAX_UPGRADE_LEVEL;
    const canBuy = !isMax && save.coins >= cost;

    let dotsHTML = '';
    for (let i = 0; i < MAX_UPGRADE_LEVEL; i++) {
      dotsHTML += `<div class="upg-card-dot${i < level ? ' filled' : ''}"></div>`;
    }

    const card = document.createElement('div');
    card.className = 'upg-card';
    card.innerHTML = `
      <div class="upg-card-title">${def.name}</div>
      <div class="upg-card-icon">${def.icon}</div>
      <div class="upg-card-dots">${dotsHTML}</div>
      <button class="upg-card-btn ${isMax ? 'maxed' : (!canBuy ? 'disabled' : '')}"
              data-key="${key}" data-cost="${cost}">
        ${isMax ? 'MAX' : 'UPGRADE \u{1FA99}' + cost}
      </button>`;
    container.appendChild(card);
  });

  // Bind buy buttons
  container.querySelectorAll('.upg-card-btn:not(.disabled):not(.maxed)').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const key = btn.dataset.key;
      const cost = parseInt(btn.dataset.cost);
      if (save.coins >= cost && save.upgrades[key] < MAX_UPGRADE_LEVEL) {
        save.coins -= cost;
        save.upgrades[key]++;
        writeSave();
        renderUpgradeCards();
        // Float text feedback
        const rect = btn.getBoundingClientRect();
        showFloatText('+1 ' + UPGRADES[key].name, rect.left + rect.width/2, rect.top);
      }
    });
  });
}

// ===== INPUT HANDLING =====
function getInputPos(e) {
  if (e.touches) return { x: e.touches[0].clientX, y: e.touches[0].clientY };
  return { x: e.clientX, y: e.clientY };
}
function getEndPos(e) {
  if (e.changedTouches) return { x: e.changedTouches[0].clientX, y: e.changedTouches[0].clientY };
  return { x: e.clientX, y: e.clientY };
}

canvas.addEventListener('mousedown', onDragStart);
canvas.addEventListener('touchstart', (e) => { e.preventDefault(); onDragStart(e); }, { passive: false });
window.addEventListener('mousemove', onDragMove);
window.addEventListener('touchmove', (e) => { e.preventDefault(); onDragMove(e); }, { passive: false });
window.addEventListener('mouseup', onDragEnd);
window.addEventListener('touchend', (e) => { onDragEnd(e); });

function onDragStart(e) {
  if (gameState === 'READY' || gameState === 'AIMING') {
    const p = getInputPos(e);
    dragStartX = p.x;
    dragStartY = p.y;
    isDragging = true;
    setState('AIMING');
  }
  if (gameState === 'FLIGHT') {
    const p = getInputPos(e);
    dragStartY = p.y;
    isDragging = true;
  }
}

function onDragMove(e) {
  if (!isDragging) return;
  const p = getInputPos(e);

  if (gameState === 'AIMING') {
    // Pull back = drag down/back on screen
    const dx = dragStartX - p.x;
    const dy = dragStartY - p.y;
    const pullDist = Math.min(Math.sqrt(dx * dx + dy * dy), MAX_PULL_PX);
    aimPower = pullDist / MAX_PULL_PX;

    // Angle from drag direction (more upward drag = steeper angle)
    const rawAngle = Math.atan2(Math.abs(dy), Math.max(Math.abs(dx), 1));
    aimAngle = Math.max(10 * DEG2RAD, Math.min(50 * DEG2RAD, rawAngle));

    // Move craft slightly backward on ramp to show pull
    const pullBack = aimPower * 2;
    craftGroup.position.set(
      CRAFT_REST_POS.x,
      CRAFT_REST_POS.y - pullBack * Math.sin(RAMP_ANGLE),
      CRAFT_REST_POS.z - pullBack * Math.cos(RAMP_ANGLE)
    );
    craftGroup.rotation.x = -aimAngle * 0.3;

    updateBands(craftGroup.position, true);

    // Trajectory preview
    const maxSpd = getMaxLaunchSpeed();
    const launchSpeed = aimPower * maxSpd;
    const previewVel = {
      x: 0,
      y: launchSpeed * Math.sin(aimAngle),
      z: launchSpeed * Math.cos(aimAngle),
    };
    updateTrajectoryPreview(craftGroup.position, previewVel, aimPower > 0.05);

    document.getElementById('power-text').textContent =
      'POWER: ' + Math.floor(aimPower * 100) + '%  ANGLE: ' + Math.floor(aimAngle / DEG2RAD) + '\u00B0';
  }

  if (gameState === 'FLIGHT') {
    // Vertical drag for pitch
    const dy = dragStartY - p.y;
    pitchInput = Math.max(-1, Math.min(1, dy / 80));
  }
}

function onDragEnd(e) {
  if (gameState === 'AIMING' && isDragging && aimPower > 0.1) {
    setState('LAUNCH');
  } else if (gameState === 'AIMING') {
    setState('READY');
  }
  if (gameState === 'FLIGHT') {
    pitchInput = 0;
  }
  isDragging = false;
}

// Keyboard input
document.addEventListener('keydown', (e) => {
  if (gameState === 'FLIGHT') {
    if (e.key === 'ArrowUp' || e.key === 'w') pitchInput = 1;
    if (e.key === 'ArrowDown' || e.key === 's') pitchInput = -1;
    if (e.key === ' ') boostActive = true;
  }
});
document.addEventListener('keyup', (e) => {
  if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'ArrowDown' || e.key === 's') pitchInput = 0;
  if (e.key === ' ') boostActive = false;
});

// ===== BUTTON HANDLERS =====
document.getElementById('btn-play').addEventListener('click', () => setState('GARAGE'));
document.getElementById('btn-fly-again').addEventListener('click', () => setState('READY'));
document.getElementById('btn-garage').addEventListener('click', () => setState('GARAGE'));
document.getElementById('btn-garage-fly').addEventListener('click', () => setState('READY'));

// Craft arrows
document.getElementById('craft-prev').addEventListener('click', (e) => {
  e.stopPropagation();
  currentCraftIdx = (currentCraftIdx - 1 + CRAFTS.length) % CRAFTS.length;
  currentSkinIdx = 0;
  save.craftIdx = currentCraftIdx; save.skinIdx = 0; writeSave();
  buildCraft(); renderGarage(); craftGroup.rotation.y = 0;
});
document.getElementById('craft-next').addEventListener('click', (e) => {
  e.stopPropagation();
  currentCraftIdx = (currentCraftIdx + 1) % CRAFTS.length;
  currentSkinIdx = 0;
  save.craftIdx = currentCraftIdx; save.skinIdx = 0; writeSave();
  buildCraft(); renderGarage(); craftGroup.rotation.y = 0;
});
// Skin arrows
document.getElementById('skin-prev').addEventListener('click', (e) => {
  e.stopPropagation();
  const skins = CRAFTS[currentCraftIdx].skins;
  currentSkinIdx = (currentSkinIdx - 1 + skins.length) % skins.length;
  save.skinIdx = currentSkinIdx; writeSave();
  buildCraft(); renderGarage(); craftGroup.rotation.y = 0;
});
document.getElementById('skin-next').addEventListener('click', (e) => {
  e.stopPropagation();
  const skins = CRAFTS[currentCraftIdx].skins;
  currentSkinIdx = (currentSkinIdx + 1) % skins.length;
  save.skinIdx = currentSkinIdx; writeSave();
  buildCraft(); renderGarage(); craftGroup.rotation.y = 0;
});

// ===== FLIGHT PHYSICS UPDATE =====
function updateFlightPhysics(dt) {
  // Pitch control
  const targetPitch = pitchInput * MAX_PITCH;
  const GLIDE_PITCH = 5 * DEG2RAD; // natural glide angle (slight nose-up)
  if (Math.abs(pitchInput) > 0.01) {
    pitch += (targetPitch - pitch) * Math.min(PITCH_SPEED * dt * 3, 1);
  } else {
    // Auto-stabilize toward natural glide angle, not zero
    pitch += (GLIDE_PITCH - pitch) * AUTO_STABILIZE * dt;
  }
  pitch = Math.max(-MAX_PITCH, Math.min(MAX_PITCH * 1.2, pitch));

  const speed = Math.sqrt(vel.x * vel.x + vel.y * vel.y + vel.z * vel.z);
  if (speed < 0.5) { triggerSplashFromFlight(); return; }

  // Angle of attack
  const velAngle = Math.atan2(vel.y, vel.z);
  let aoa = pitch - velAngle;
  aoa = Math.max(-Math.PI / 4, Math.min(Math.PI / 4, aoa));

  // Stall: reduce lift at extreme AoA
  let stallFactor = 1.0;
  const absAoA = Math.abs(aoa);
  if (absAoA > 20 * DEG2RAD) {
    stallFactor = Math.max(0.1, 1.0 - (absAoA - 20 * DEG2RAD) / (25 * DEG2RAD));
  }

  // Low speed lift reduction (gentle curve)
  let speedLiftFactor = Math.min(1.0, speed / 5);

  // Lift
  const liftCoeff = getLiftCoeff();
  const wingArea = getWingArea();
  const liftMag = 0.5 * AIR_DENSITY * speed * speed * wingArea * liftCoeff * Math.sin(2 * aoa) * stallFactor * speedLiftFactor;

  // Lift direction: perpendicular to velocity in YZ plane
  const liftY = liftMag * (vel.z / speed);
  const liftZ = liftMag * (-vel.y / speed);

  // Drag
  const dragCoeff = getDragCoeff();
  const dragMag = 0.5 * AIR_DENSITY * speed * speed * wingArea * dragCoeff;
  const dragY = -dragMag * (vel.y / speed);
  const dragZ = -dragMag * (vel.z / speed);

  // Engine thrust
  let thrustY = 0, thrustZ = 0;
  if (fuel > 0 && (boostActive || (save.upgrades.engine > 0))) {
    const thrust = getEngineThrust();
    if (thrust > 0) {
      thrustY = thrust * Math.sin(pitch) * 0.5;
      thrustZ = thrust * Math.cos(pitch);
      fuel -= dt;
      if (fuel < 0) fuel = 0;
    }
  }

  // Apply forces
  vel.y += (liftY + dragY + thrustY - GRAVITY) * dt;
  vel.z += (liftZ + dragZ + thrustZ) * dt;

  // Clamp max speed
  const newSpeed = Math.sqrt(vel.y * vel.y + vel.z * vel.z);
  if (newSpeed > 80) {
    const factor = 80 / newSpeed;
    vel.y *= factor; vel.z *= factor;
  }

  // Update position
  pos.x += vel.x * dt;
  pos.y += vel.y * dt;
  pos.z += vel.z * dt;

  // Track stats
  flightDistance = Math.max(0, pos.z);
  if (pos.y > maxAltitude) maxAltitude = pos.y;
  const curSpeed = Math.sqrt(vel.y * vel.y + vel.z * vel.z);
  if (curSpeed > maxSpeed) maxSpeed = curSpeed;

  // Altitude ceiling — keep the game visually grounded
  const MAX_ALTITUDE = 50;
  if (pos.y > MAX_ALTITUDE) {
    pos.y = MAX_ALTITUDE;
    if (vel.y > 0) vel.y *= 0.5; // dampen upward velocity
  }

  // Splash check
  if (pos.y <= 0) {
    triggerSplashFromFlight();
    return;
  }

  // Update craft position and rotation
  craftGroup.position.set(pos.x, pos.y, pos.z);
  craftGroup.rotation.x = -pitch;


  // Wind trail
  trailTimer += dt;
  if (trailTimer > 0.08 && curSpeed > 3) {
    spawnTrail(pos.x, pos.y, pos.z - 1.5);
    trailTimer = 0;
  }

  // Boost particles
  if (fuel > 0 && getEngineThrust() > 0) {
    boostTimer += dt;
    if (boostTimer > 0.05) {
      spawnBoostParticle(pos.x, pos.y, pos.z - 1.2);
      boostTimer = 0;
    }
  }

  // Distance milestones
  const currentMilestone = Math.floor(flightDistance / 50) * 50;
  if (currentMilestone > lastMilestone && currentMilestone > 0) {
    lastMilestone = currentMilestone;
    showFloatText(currentMilestone + 'm!', window.innerWidth / 2, window.innerHeight / 3);
  }

  // Update HUD
  document.getElementById('hud-dist').textContent = Math.floor(flightDistance) + 'm';
  document.getElementById('hud-alt').textContent = 'ALT: ' + Math.floor(pos.y) + 'm';
  document.getElementById('hud-speed').textContent = 'SPD: ' + Math.floor(curSpeed);
  const fuelPct = getMaxFuel() > 0 ? (fuel / getMaxFuel()) * 100 : 0;
  document.getElementById('hud-boost').style.width = fuelPct + '%';
  const coinsSoFar = Math.floor((flightDistance / 5 + maxAltitude / 2) * getIncomeMulti());
  document.getElementById('hud-coins').textContent = coinsSoFar + ' coins';
}

function triggerSplashFromFlight() {
  pos.y = 0;
  setState('SPLASH');
}

// ===== CAMERA UPDATE =====
function updateCamera(dt) {
  if (gameState === 'FLIGHT' || gameState === 'LAUNCH') {
    camTarget.set(pos.x * 0.3, pos.y + 3, pos.z - 8);
    camLookTarget.set(pos.x * 0.2, pos.y + 0.5, pos.z + 15);
  } else if (gameState === 'SPLASH') {
    camTarget.set(pos.x, 4, pos.z - 10);
    camLookTarget.set(pos.x, 0.5, pos.z);
  }
  camera.position.lerp(camTarget, camLerp);
  const lookAt = new THREE.Vector3();
  lookAt.copy(camera.userData.lookAt || camLookTarget);
  lookAt.lerp(camLookTarget, camLerp);
  camera.userData.lookAt = lookAt;
  camera.lookAt(lookAt);
}

// ===== CRAFT IDLE ANIMATIONS =====
function updateIdleCraft(time) {
  if (gameState === 'TITLE' || gameState === 'READY') {
    craftGroup.position.y = CRAFT_REST_POS.y + Math.sin(time * 1.5) * 0.05;
  }
  if (gameState === 'GARAGE') {
    craftGroup.rotation.y += 0.008;
    craftGroup.position.y = CRAFT_REST_POS.y + Math.sin(time * 1.2) * 0.06;
  }
}

// ===== MAIN LOOP =====
let lastTime = 0;
function gameLoop(timestamp) {
  requestAnimationFrame(gameLoop);
  const rawDt = (timestamp - lastTime) / 1000;
  lastTime = timestamp;
  const dt = Math.min(rawDt, 1 / 30);
  if (dt < 0.001) return;

  const time = timestamp / 1000;

  switch (gameState) {
    case 'TITLE':
    case 'GARAGE':
    case 'READY':
      updateIdleCraft(time);
      break;
    case 'AIMING':
      break;
    case 'LAUNCH':
    case 'FLIGHT':
      updateFlightPhysics(dt);
      break;
    case 'SPLASH':
      // Craft bobs in water
      craftGroup.position.y = Math.sin(time * 2) * 0.15 + 0.3;
      craftGroup.rotation.z = Math.sin(time * 1.5) * 0.05;
      break;
  }

  updateCamera(dt);
  updateSplashParticles(dt);
  updateTrailParticles(dt);
  updateBoostParticles(dt);
  updateWater(time);

  // Update sun shadow to follow craft during flight
  if (gameState === 'FLIGHT' || gameState === 'LAUNCH') {
    sunLight.position.set(pos.x + 40, 80, pos.z + 30);
    sunLight.target.position.set(pos.x, pos.y, pos.z);
    sunLight.target.updateMatrixWorld();
  }

  renderer.render(scene, camera);
}

// ===== INIT =====
loadSave();
currentCraftIdx = save.craftIdx || 0;
currentSkinIdx = save.skinIdx || 0;
buildCraft();
camera.position.set(0, RAMP_HEIGHT + 5, -10);
camera.userData.lookAt = new THREE.Vector3(0, RAMP_HEIGHT, 5);
camera.lookAt(0, RAMP_HEIGHT, 5);
setState('TITLE');
requestAnimationFrame((t) => { lastTime = t; requestAnimationFrame(gameLoop); });
</script>
